name: Refresh circle JSON

on:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh JSON files
        env:
          CLUB_114037107_URL: ${{ secrets.CLUB_114037107_URL }}
          CLUB_278155676_URL: ${{ secrets.CLUB_278155676_URL }}
          CLUB_754870359_URL: ${{ secrets.CLUB_754870359_URL }}
          CLUB_147185239_URL: ${{ secrets.CLUB_147185239_URL }}
          CLUB_961801794_URL: ${{ secrets.CLUB_961801794_URL }}
          CLUB_449007774_URL: ${{ secrets.CLUB_449007774_URL }}
          CLUB_510137721_URL: ${{ secrets.CLUB_510137721_URL }}
          CLUB_387070372_URL: ${{ secrets.CLUB_387070372_URL }}
          DOWNLOAD_AUTH_HEADER: ${{ secrets.DOWNLOAD_AUTH_HEADER }}
          DOWNLOAD_COOKIE: ${{ secrets.DOWNLOAD_COOKIE }}
        run: node scripts/update-json.mjs

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "Refresh circle JSON"

      - name: Push changes
        run: git push
