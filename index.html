<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dominator Network — Circle Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0912; min-height: 100%; }
    body { overflow-y: scroll; }
    button { font-family: inherit; }
    textarea:focus, button:focus-visible, select:focus-visible {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0912; }
    ::-webkit-scrollbar-thumb { background: #1e1b35; border-radius: 3px; }
  </style>

  <script>
    window.__ALLOW_APP__ = false;

    const password = prompt("Enter password:");

    if (password === "dominatornetworkumafantracker") {
      window.__ALLOW_APP__ = true;
    } else {
      document.documentElement.innerHTML = `
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>Access denied</title>
          <style>
            html, body {
              margin: 0;
              min-height: 100vh;
              background: #0a0912;
              color: white;
              font-family: Arial, sans-serif;
            }
            body {
              display: flex;
              align-items: center;
              justify-content: center;
            }
            h1 { font-size: 32px; }
          </style>
        </head>
        <body>
          <h1>Access denied</h1>
        </body>
      `;
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CLUBS = [
      { tier: "S",  name: "Dominator",  officer: "@mikufans.",     id: "114037107", target: 75_000_000 },
      { tier: "S",  name: "Dominant H", officer: "@.stayk",        id: "278155676", target: 75_000_000 },
      { tier: "S",  name: "Dominance",  officer: "@mikufans.",     id: "955490905", target: 75_000_000 },
      { tier: "A+", name: "Dominate",   officer: "@reyovalt",      id: "147185239", target: 50_000_000 },
      { tier: "A+", name: "Domineer",   officer: "@patuazul",      id: "961801794", target: 50_000_000 },
      { tier: "A+", name: "Dominium",   officer: "@jkpokes",       id: "449007774", target: 50_000_000 },
      { tier: "A",  name: "Dominion",   officer: "@virsia",        id: "510137721", target: 30_000_000 },
      { tier: "A",  name: "Domical",    officer: "@mikufans.",     id: "754870359", target: 30_000_000 },
      { tier: "B+", name: "Domicile",   officer: "@goofyahhclown", id: "387070372", target: 20_000_000 },
      { tier: "B+", name: "Domichill",  officer: "@mikufans.",     id: null,        target: 20_000_000 },
    ];

    const MAX_MEMBERS = 30;
    const TIER_COLORS = {
      "S":  { bg: "#fbbf2422", border: "#fbbf24", text: "#fbbf24", bar: "#f59e0b" },
      "A+": { bg: "#a78bfa22", border: "#a78bfa", text: "#a78bfa", bar: "#7c3aed" },
      "A":  { bg: "#34d39922", border: "#34d399", text: "#34d399", bar: "#059669" },
      "B+": { bg: "#60a5fa22", border: "#60a5fa", text: "#60a5fa", bar: "#2563eb" },
    };

    const fmt = (n) => {
      if (n == null) return "—";
      const abs = Math.abs(n), sign = n < 0 ? "-" : "";
      if (abs >= 1_000_000_000) return sign + (abs / 1_000_000_000).toFixed(2) + "B";
      if (abs >= 1_000_000)     return sign + (abs / 1_000_000).toFixed(2) + "M";
      if (abs >= 1_000)         return sign + (abs / 1_000).toFixed(1) + "K";
      return Number(n).toLocaleString();
    };

    const fmtFull = (n) => (n == null ? "—" : Number(n).toLocaleString());
    const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
    const gainColor = (n) => n == null ? "#6b7280" : n > 0 ? "#34d399" : n < 0 ? "#f87171" : "#9ca3af";

    function parseJSON(raw) {
      let json;
      try {
        json = typeof raw === "string" ? JSON.parse(raw.trim()) : raw;
      } catch (e) {
        return { error: "Invalid JSON: " + e.message };
      }

      const membersArr = Array.isArray(json)
        ? json
        : Array.isArray(json.members)
        ? json.members
        : Array.isArray(json.data?.members)
        ? json.data.members
        : null;

      if (!membersArr || membersArr.length === 0) {
        return { error: "No members array found. Keys in JSON: " + Object.keys(json).join(", ") };
      }

      const now = new Date();
      const today = now.getDate();
      const dim = daysInMonth(now.getFullYear(), now.getMonth() + 1);

      const members = membersArr.map((m) => {
        if (m.fan_count != null) {
          return {
            name: m.name || m.trainer_name || "Unknown",
            fans: m.fan_count,
            dailyGain: m.daily_gain ?? null,
            monthlyGain: m.monthly_gain ?? null,
            projected: m.projected_monthly ?? null,
            isActive: m.isActive !== false,
            dailyFans: Array.isArray(m.daily_fans) ? m.daily_fans : [],
          };
        }

        const df = Array.isArray(m.daily_fans) ? m.daily_fans : [];
        const todayIdx = Math.min(today - 1, df.length - 1);
        let currentFans = 0, latestIdx = -1;

        for (let i = todayIdx; i >= 0; i--) {
          if (df[i] > 0) {
            currentFans = df[i];
            latestIdx = i;
            break;
          }
        }

        let dailyGain = null;
        if (latestIdx >= 1) {
          for (let i = latestIdx - 1; i >= 0; i--) {
            if (df[i] > 0) {
              dailyGain = currentFans - df[i];
              break;
            }
          }
        }

        const firstNZ = df.find(v => v > 0);
        const monthlyGain = firstNZ != null && currentFans > 0 ? currentFans - firstNZ : null;
        const daysWithData = df.slice(0, todayIdx + 1).filter(v => v > 0).length;
        let projected = null;

        if (monthlyGain !== null && daysWithData > 0) {
          projected = Math.round((monthlyGain / Math.max(daysWithData, 1)) * dim);
        } else if (dailyGain !== null) {
          projected = Math.round(dailyGain * dim);
        }

        return {
          name: m.trainer_name || m.name || "Unknown",
          fans: currentFans,
          dailyGain,
          monthlyGain,
          projected,
          isActive: true,
          dailyFans: df,
        };
      });

      const clubName = json?.circle?.name || json?.name || "Unknown";
      const lastFetch = json?.circle?.last_updated || json?.circle?.yesterday_updated || null;
      return { members, clubName, lastFetch };
    }

    function ProgressBar({ pct, color = "#7c3aed", height = 8 }) {
      return (
        <div style={{ background: "#1a1730", borderRadius: 99, height, overflow: "hidden", width: "100%" }}>
          <div
            style={{
              width: `${Math.min(100, Math.max(0, pct || 0))}%`,
              height: "100%",
              background: color,
              borderRadius: 99,
              transition: "width 0.5s ease"
            }}
          />
        </div>
      );
    }

    function TierBadge({ tier }) {
      const c = TIER_COLORS[tier] || TIER_COLORS["B+"];
      return (
        <span style={{
          background: c.bg,
          border: `1px solid ${c.border}`,
          color: c.text,
          borderRadius: 6,
          padding: "2px 8px",
          fontSize: 11,
          fontWeight: 800
        }}>
          {tier}
        </span>
      );
    }

    function Sparkline({ data = [], width = 90, height = 26 }) {
      const vals = data.filter(v => v > 0);
      if (vals.length < 2) return <span style={{ color: "#4b5563", fontSize: 10 }}>—</span>;

      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min || 1;
      const step = width / (vals.length - 1);

      const pts = vals
        .map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`)
        .join(" ");

      const lx = (vals.length - 1) * step;
      const ly = height - ((vals[vals.length - 1] - min) / range) * (height - 4) - 2;

      return (
        <svg width={width} height={height}>
          <polyline points={pts} fill="none" stroke="#7c3aed" strokeWidth={1.5} strokeLinejoin="round" />
          <circle cx={lx} cy={ly} r={2.5} fill="#c4b5fd" />
        </svg>
      );
    }

    function CircleTracker() {
      const now = new Date();
      const today = now.getDate();
      const dim = daysInMonth(now.getFullYear(), now.getMonth() + 1);
      const daysLeft = dim - today;

      const [activeIdx, setActiveIdx] = useState(0);
      const [clubData, setClubData] = useState({});
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [tab, setTab] = useState("dashboard");
      const [copied, setCopied] = useState(false);
      const [debugLog, setDebugLog] = useState([]);
      const [showInactive, setShowInactive] = useState(false);

      const club = CLUBS[activeIdx];
      const cid = club.id;
      const data = cid ? (clubData[cid] || null) : null;
      const allMembers = data?.members || [];
      const members = showInactive ? allMembers : allMembers.filter(m => m.isActive !== false);
      const tc = TIER_COLORS[club.tier] || TIER_COLORS["B+"];

      async function fetchData(idOverride = null, silent = false) {
        const targetId = idOverride || cid;
        if (!targetId) return;

        if (!silent) {
          setLoading(true);
          setErr("");
        }

        const log = [];
        const candidates = [
          `./data/${targetId}.json`,
          `/data/${targetId}.json`
        ];

        for (const url of candidates) {
          try {
            const res = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
            log.push(`${res.ok ? "✓" : "✗"} ${url} → ${res.status}`);

            if (!res.ok) continue;

            const text = await res.text();
            const result = parseJSON(text);

            if (result.error) {
              log.push("  ↳ " + result.error);
              continue;
            }

            setClubData(prev => ({
              ...prev,
              [targetId]: {
                members: result.members,
                clubName: result.clubName,
                lastFetch: result.lastFetch || new Date().toISOString()
              }
            }));

            setDebugLog(log);
            if (!silent) setLoading(false);
            return;
          } catch (e) {
            log.push(`✗ ${url} → ${e.message}`);
          }
        }

        setDebugLog(log);
        if (!silent) {
          setErr(`Failed to load repo JSON for ${targetId}. Make sure data/${targetId}.json exists.`);
          setLoading(false);
        }
      }

      async function loadAllData() {
        setLoading(true);
        setErr("");
        const allLogs = [];

        const next = {};

        for (const c of CLUBS) {
          if (!c.id) continue;
          try {
            const res = await fetch(`./data/${c.id}.json`, {
              headers: { Accept: "application/json" },
              cache: "no-store"
            });

            allLogs.push(`${res.ok ? "✓" : "✗"} ./data/${c.id}.json → ${res.status}`);

            if (!res.ok) continue;

            const text = await res.text();
            const result = parseJSON(text);

            if (result.error) {
              allLogs.push(`  ↳ ${c.id}: ${result.error}`);
              continue;
            }

            next[c.id] = {
              members: result.members,
              clubName: result.clubName,
              lastFetch: result.lastFetch || new Date().toISOString()
            };
          } catch (e) {
            allLogs.push(`✗ ./data/${c.id}.json → ${e.message}`);
          }
        }

        setClubData(next);
        setDebugLog(allLogs);
        setLoading(false);
      }

      useEffect(() => {
        loadAllData();
      }, []);

      useEffect(() => {
        if (cid && !clubData[cid]) {
          fetchData(cid, true);
        }
      }, [activeIdx]);

      const activeMembers = allMembers.filter(m => m.isActive !== false);
      const inactiveMembers = allMembers.filter(m => m.isActive === false);
      const sorted = [...members].sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0));
      const totalFans = activeMembers.reduce((s, m) => s + (m.fans || 0), 0);
      const totalDaily = activeMembers.reduce((s, m) => s + (m.dailyGain ?? 0), 0);
      const totalMonthly = activeMembers.reduce((s, m) => s + (m.monthlyGain ?? 0), 0);
      const totalProj = activeMembers.reduce((s, m) => s + (m.projected ?? 0), 0);
      const membersOnTrack = activeMembers.length
        ? activeMembers.filter(m => (m.projected ?? 0) >= club.target).length
        : 0;
      const lastFetch = data?.lastFetch || null;

      function buildDiscord() {
        const bar = (p, len = 18) => {
          const f = Math.round(Math.min(p, 100) / 100 * len);
          return "█".repeat(f) + "░".repeat(len - f);
        };
        const P = (s, n) => String(s).padStart(n);
        const PL = (s, n) => String(s).padEnd(n);
        const dg = (n) => n != null ? ((n >= 0 ? "+" : "") + fmt(n)) : "—";
        const ds = now.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

        let msg = `📊 **[${club.tier}] ${club.name} — Circle Report** | ${ds}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `🎯 **Per-Member Target:** ${fmt(club.target)}/month\n`;
        msg += `👥 **Active Members:** ${activeMembers.length}/${MAX_MEMBERS}  |  📅 Day ${today}/${dim} · ${daysLeft} days left\n`;
        msg += `✅ On track: **${membersOnTrack}/${activeMembers.length || 0}** members\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += "```\n";
        msg += `${PL("MEMBER",20)}${P("FANS",12)}${P("+TODAY",10)}${P("+MONTH",11)}${P("PROJ",10)}${P("ST",4)}\n`;
        msg += "─".repeat(67) + "\n";

        [...activeMembers]
          .sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0))
          .forEach(m => {
            const ok = (m.projected ?? 0) >= club.target;
            msg += `${PL(m.name.slice(0, 19), 20)}${P(fmt(m.fans), 12)}${P(dg(m.dailyGain), 10)}${P(dg(m.monthlyGain), 11)}${P(m.projected != null ? fmt(m.projected) : "—", 10)}${P(ok ? "✅" : "⚠️", 4)}\n`;
          });

        msg += "─".repeat(67) + "\n";
        msg += `${PL("TOTAL",20)}${P(fmt(totalFans),12)}${P(dg(totalDaily),10)}${P(dg(totalMonthly),11)}${P(fmt(totalProj),10)}\n`;
        msg += "```\n";

        [...activeMembers]
          .sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0))
          .forEach(m => {
            const p = club.target > 0 ? Math.min(100, ((m.monthlyGain ?? 0) / club.target) * 100) : 0;
            msg += `**${m.name}** \`${bar(p)}\` ${p.toFixed(1)}% of target\n`;
          });

        msg += `> 🤖 *Dominator Network Tracker · ${club.officer}*`;
        return msg;
      }

      async function copyDiscord() {
        await navigator.clipboard.writeText(buildDiscord());
        setCopied(true);
        setTimeout(() => setCopied(false), 2200);
      }

      const S = {
        root: {
          background: "#0a0912",
          minHeight: "100vh",
          color: "#e2e0f0",
          fontFamily: "'Inter',system-ui,sans-serif",
          padding: "16px",
          maxWidth: 1100,
          margin: "0 auto"
        },
        card: {
          background: "#111028",
          border: "1px solid #1e1b35",
          borderRadius: 14,
          padding: "16px 18px",
          marginBottom: 14
        },
        h2: {
          fontSize: 11,
          fontWeight: 700,
          color: "#6b7280",
          textTransform: "uppercase",
          letterSpacing: "0.12em",
          margin: "0 0 14px"
        },
        btn: (active, col = "#7c3aed") => ({
          background: active ? col : "#13112a",
          color: active ? "#fff" : "#6b7280",
          border: `1px solid ${active ? col : "#1e1b35"}`,
          borderRadius: 8,
          padding: "7px 14px",
          cursor: "pointer",
          fontSize: 12,
          fontWeight: 600,
          transition: "all 0.15s"
        }),
      };

      return (
        <div style={S.root}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:8 }}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:"#e2e0f0", display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ color:tc.text }}>⬡</span> Dominator Network
                <span style={{ color:"#4b5563", fontSize:13, fontWeight:400 }}>Fan Tracker</span>
              </div>
              <div style={{ color:"#4b5563", fontSize:11, marginTop:2 }}>
                {now.toLocaleString("en-US",{month:"long",day:"numeric",year:"numeric"})} · Day {today}/{dim} · {daysLeft} days left
              </div>
            </div>

            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              <button style={S.btn(false)} onClick={() => fetchData()} disabled={loading || !cid}>
                {loading ? "⟳ Refreshing…" : "🔄 Refresh Data"}
              </button>
              <button style={S.btn(true, copied ? "#059669" : tc.bar)} onClick={copyDiscord} disabled={!activeMembers.length}>
                {copied ? "✓ Copied!" : "💬 Discord"}
              </button>
            </div>
          </div>

          <div style={{ ...S.card, padding:"12px 14px" }}>
            <div style={S.h2}>Select Club</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {CLUBS.map((c, i) => {
                const ctc = TIER_COLORS[c.tier] || TIER_COLORS["B+"];
                const active = i === activeIdx;
                const hasData = c.id && clubData[c.id];
                return (
                  <button
                    key={i}
                    onClick={() => { setActiveIdx(i); setErr(""); setTab("dashboard"); }}
                    style={{
                      background: active ? ctc.bg : "#0f0d1a",
                      border: `1px solid ${active ? ctc.border : "#1e1b35"}`,
                      borderRadius: 10,
                      padding: "7px 12px",
                      cursor: c.id ? "pointer" : "not-allowed",
                      opacity: c.id ? 1 : 0.45,
                      display: "flex",
                      alignItems: "center",
                      gap: 6,
                      transition: "all 0.15s"
                    }}
                  >
                    <span style={{
                      fontSize: 10,
                      fontWeight: 800,
                      color: active ? ctc.text : "#6b7280",
                      background: active ? ctc.bg : "#1a1730",
                      border: `1px solid ${active ? ctc.border : "#2a2540"}`,
                      borderRadius: 4,
                      padding: "1px 5px"
                    }}>
                      {c.tier}
                    </span>
                    <span style={{ fontSize:12, fontWeight:600, color: active ? "#e2e0f0" : "#6b7280" }}>
                      {c.name}
                    </span>
                    {hasData && <span style={{ width:5, height:5, borderRadius:"50%", background:"#34d399", flexShrink:0 }}/>}
                    {!c.id && <span style={{ fontSize:9, color:"#4b5563" }}>soon</span>}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ ...S.card, background:tc.bg, border:`1px solid ${tc.border}`, padding:"14px 18px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <TierBadge tier={club.tier}/>
                <div>
                  <div style={{ fontSize:20, fontWeight:800, color:"#e2e0f0" }}>{data?.clubName || club.name}</div>
                  <div style={{ fontSize:11, color:"#9ca3af" }}>
                    Officer: {club.officer} · ID: {club.id || "TBD"} · Max {MAX_MEMBERS} members
                  </div>
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:13, fontWeight:700, color:tc.text }}>{fmt(club.target)} / member / month</div>
                {lastFetch && <div style={{ fontSize:10, color:"#6b7280", marginTop:2 }}>Updated {new Date(lastFetch).toLocaleString()}</div>}
              </div>
            </div>
          </div>

          {!cid && (
            <div style={{ ...S.card, textAlign:"center", padding:"50px 20px" }}>
              <div style={{ fontSize:40, marginBottom:10 }}>🔜</div>
              <div style={{ color:"#6b7280" }}><b style={{color:"#9ca3af"}}>{club.name}</b> is a future addition.</div>
            </div>
          )}

          {err && (
            <div style={{ background:"#450a0a", border:"1px solid #7f1d1d", borderRadius:12, padding:"12px 16px", marginBottom:14, color:"#fca5a5", fontSize:12 }}>
              ⚠️ {err}
            </div>
          )}

          {cid && !allMembers.length && (
            <div style={{ ...S.card, textAlign:"center", padding:"50px 20px" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🏇</div>
              <div style={{ color:"#6b7280", marginBottom:16 }}>
                No data for <b style={{color:"#9ca3af"}}>{club.name}</b> yet.
              </div>
              <div style={{ display:"flex", justifyContent:"center", gap:8 }}>
                <button style={S.btn(false, tc.bar)} onClick={() => fetchData()}>
                  🔄 Refresh Data
                </button>
              </div>
            </div>
          )}

          {cid && allMembers.length > 0 && (
            <>
              <div style={{ display:"flex", gap:5, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
                {[["dashboard","📊 Overview"],["members","👥 Members"],["debug","🔧 Debug"]].map(([t,label]) => (
                  <button key={t} style={S.btn(tab===t, tab===t ? tc.bar : undefined)} onClick={() => setTab(t)}>
                    {label}
                  </button>
                ))}

                {inactiveMembers.length > 0 && (
                  <button
                    style={{ ...S.btn(showInactive,"#374151"), marginLeft:"auto", fontSize:11 }}
                    onClick={() => setShowInactive(v => !v)}
                  >
                    {showInactive ? "👁 Hiding Inactive" : `👁 Show Inactive (${inactiveMembers.length})`}
                  </button>
                )}
              </div>

              {tab === "dashboard" && (
                <>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
                    {[
                      { label:"Active Members", value:`${activeMembers.length}/${MAX_MEMBERS}`, sub:"Active / Capacity", col:"#e2e0f0" },
                      { label:"On Track", value:`${membersOnTrack}/${activeMembers.length}`, sub:"Hit projected target", col:membersOnTrack===activeMembers.length ? "#34d399" : "#fbbf24" },
                      { label:"Club Daily +", value:fmt(totalDaily), sub:"All active members today", col:gainColor(totalDaily) },
                      { label:"Club Monthly +", value:fmt(totalMonthly), sub:"Since 1st of month", col:gainColor(totalMonthly) },
                      { label:"Per-Mbr Target", value:fmt(club.target), sub:`${daysLeft} days left`, col:tc.text },
                    ].map(p => (
                      <div key={p.label} style={{ background:"#111028", border:"1px solid #1e1b35", borderRadius:12, padding:"11px 14px", flex:1, minWidth:110 }}>
                        <div style={{ color:"#4b5563", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:3 }}>{p.label}</div>
                        <div style={{ color:p.col, fontSize:18, fontWeight:700 }}>{p.value}</div>
                        <div style={{ color:"#4b5563", fontSize:10, marginTop:2 }}>{p.sub}</div>
                      </div>
                    ))}
                  </div>

                  <div style={S.card}>
                    <div style={S.h2}>Member Progress — Sorted by Monthly Gain</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {sorted.filter(m => m.isActive !== false).map((m, i) => {
                        const monthPct = club.target > 0 ? Math.min(100, ((m.monthlyGain ?? 0) / club.target) * 100) : 0;
                        const onTrack = (m.projected ?? 0) >= club.target;
                        const stillNeed = Math.max(0, club.target - (m.monthlyGain ?? 0));

                        return (
                          <div key={m.name + i} style={{ background:"#0f0d1a", border:`1px solid ${onTrack ? "#34d39933" : "#1e1b35"}`, borderRadius:10, padding:"12px 14px" }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7, flexWrap:"wrap", gap:4 }}>
                              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                <span style={{ color:"#4b5563", fontSize:11, fontWeight:700, minWidth:20 }}>#{i+1}</span>
                                <span style={{ fontWeight:700, color:"#e2e0f0", fontSize:13 }}>{m.name}</span>
                                <span style={{
                                  background: onTrack ? "#34d39922" : "#fbbf2422",
                                  color: onTrack ? "#34d399" : "#fbbf24",
                                  border: `1px solid ${onTrack ? "#34d39966" : "#fbbf2466"}`,
                                  borderRadius: 4,
                                  fontSize: 10,
                                  fontWeight: 700,
                                  padding: "1px 6px"
                                }}>
                                  {onTrack ? "✅ ON TRACK" : "⚠️ BEHIND"}
                                </span>
                              </div>

                              <div style={{ display:"flex", gap:14, fontSize:11, flexWrap:"wrap" }}>
                                <span style={{color:"#6b7280"}}>Today: <b style={{color:gainColor(m.dailyGain)}}>{m.dailyGain != null ? (m.dailyGain >= 0 ? "+" : "") + fmt(m.dailyGain) : "—"}</b></span>
                                <span style={{color:"#6b7280"}}>Month: <b style={{color:gainColor(m.monthlyGain)}}>{m.monthlyGain != null ? (m.monthlyGain >= 0 ? "+" : "") + fmt(m.monthlyGain) : "—"}</b></span>
                                <span style={{color:"#6b7280"}}>Projected: <b style={{color:"#c4b5fd"}}>{m.projected != null ? fmt(m.projected) : "—"}</b></span>
                              </div>
                            </div>

                            <div style={{ marginBottom:8 }}>
                              <ProgressBar pct={monthPct} color={onTrack ? "#34d399" : tc.bar} height={9}/>
                            </div>

                            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))", gap:10, alignItems:"center" }}>
                              <div>
                                <div style={{ color:"#4b5563", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em" }}>Current Fans</div>
                                <div style={{ color:"#e2e0f0", fontWeight:700, fontSize:14 }}>{fmtFull(m.fans)}</div>
                              </div>
                              <div>
                                <div style={{ color:"#4b5563", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em" }}>Target Progress</div>
                                <div style={{ color:onTrack ? "#34d399" : "#fbbf24", fontWeight:700, fontSize:14 }}>{monthPct.toFixed(1)}%</div>
                              </div>
                              <div>
                                <div style={{ color:"#4b5563", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em" }}>Still Needed</div>
                                <div style={{ color:"#e2e0f0", fontWeight:700, fontSize:14 }}>{fmt(stillNeed)}</div>
                              </div>
                              <div style={{ justifySelf:"end" }}>
                                <Sparkline data={m.dailyFans || []}/>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </>
              )}

              {tab === "members" && (
                <div style={S.card}>
                  <div style={S.h2}>Members</div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse" }}>
                      <thead>
                        <tr style={{ textAlign:"left", color:"#6b7280", fontSize:11 }}>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>#</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Name</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Fans</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Today</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Month</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Projected</th>
                          <th style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sorted.map((m, i) => {
                          const onTrack = (m.projected ?? 0) >= club.target;
                          return (
                            <tr key={m.name + i}>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:"#6b7280" }}>{i + 1}</td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:"#e2e0f0", fontWeight:700 }}>{m.name}</td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35" }}>{fmtFull(m.fans)}</td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:gainColor(m.dailyGain) }}>
                                {m.dailyGain != null ? (m.dailyGain >= 0 ? "+" : "") + fmt(m.dailyGain) : "—"}
                              </td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:gainColor(m.monthlyGain) }}>
                                {m.monthlyGain != null ? (m.monthlyGain >= 0 ? "+" : "") + fmt(m.monthlyGain) : "—"}
                              </td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:"#c4b5fd" }}>
                                {m.projected != null ? fmt(m.projected) : "—"}
                              </td>
                              <td style={{ padding:"10px 8px", borderBottom:"1px solid #1e1b35", color:onTrack ? "#34d399" : "#fbbf24", fontWeight:700 }}>
                                {onTrack ? "On Track" : "Behind"}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {tab === "debug" && (
                <div style={S.card}>
                  <div style={S.h2}>Debug</div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                    <button style={S.btn(false)} onClick={() => fetchData()}>Reload current club</button>
                    <button style={S.btn(false)} onClick={() => loadAllData()}>Reload all clubs</button>
                    <button style={S.btn(false)} onClick={() => setDebugLog([])}>Clear log</button>
                  </div>

                  <div style={{ color:"#9ca3af", fontSize:12, marginBottom:12, lineHeight:1.7 }}>
                    This page reads JSON from your deployed repo files.
                    Expected path for this club: <b style={{ color:"#e2e0f0" }}>data/{cid}.json</b>
                  </div>

                  <pre style={{
                    whiteSpace:"pre-wrap",
                    wordBreak:"break-word",
                    background:"#0a0912",
                    border:"1px solid #1e1b35",
                    borderRadius:10,
                    padding:12,
                    color:"#c4b5fd",
                    fontSize:12,
                    lineHeight:1.55
                  }}>
{debugLog.length ? debugLog.join("\n") : "No debug entries yet."}
                  </pre>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    if (window.__ALLOW_APP__) {
      ReactDOM.createRoot(document.getElementById("root")).render(<CircleTracker />);
    }
  </script>
</body>
</html>
