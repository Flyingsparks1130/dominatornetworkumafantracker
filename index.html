<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dominator Network — Circle Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0912; min-height: 100%; }
    body { overflow-y: scroll; }
    button { font-family: inherit; }
    input:focus, textarea:focus, button:focus-visible, select:focus-visible {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0912; }
    ::-webkit-scrollbar-thumb { background: #1e1b35; border-radius: 3px; }
  </style>

  <script>
    window.__ALLOW_APP__ = false;

    const password = prompt("Enter password:");

    if (password === "dominatornetworkumafantracker") {
      window.__ALLOW_APP__ = true;
    } else {
      document.documentElement.innerHTML = `
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>Access denied</title>
          <style>
            html, body {
              margin: 0;
              min-height: 100vh;
              background: #0a0912;
              color: white;
              font-family: Arial, sans-serif;
            }
            body {
              display: flex;
              align-items: center;
              justify-content: center;
            }
            h1 { font-size: 32px; }
          </style>
        </head>
        <body>
          <h1>Access denied</h1>
        </body>
      `;
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CLUBS = [
      { tier: "S",  name: "Dominator",  officer: "@mikufans.",     id: "114037107", target: 75_000_000 },
      { tier: "S",  name: "Dominant H", officer: "@.stayk",        id: "278155676", target: 75_000_000 },
      { tier: "S",  name: "Dominance",  officer: "@mikufans.",     id: "955490905", target: 75_000_000 },
      { tier: "A+", name: "Dominate",   officer: "@reyovalt",      id: "147185239", target: 50_000_000 },
      { tier: "A+", name: "Domineer",   officer: "@patuazul",      id: "961801794", target: 50_000_000 },
      { tier: "A+", name: "Dominium",   officer: "@jkpokes",       id: "449007774", target: 50_000_000 },
      { tier: "A",  name: "Dominion",   officer: "@virsia",        id: "510137721", target: 30_000_000 },
      { tier: "A",  name: "Domical",    officer: "@mikufans.",     id: "754870359", target: 30_000_000 },
      { tier: "B+", name: "Domicile",   officer: "@goofyahhclown", id: "387070372", target: 20_000_000 },
      { tier: "B+", name: "Domichill",  officer: "@mikufans.",     id: null,        target: 20_000_000 },
    ];

    const MAX_MEMBERS = 30;
    const TIER_COLORS = {
      "S":  { bg: "#fbbf2422", border: "#fbbf24", text: "#fbbf24", bar: "#f59e0b" },
      "A+": { bg: "#a78bfa22", border: "#a78bfa", text: "#a78bfa", bar: "#7c3aed" },
      "A":  { bg: "#34d39922", border: "#34d399", text: "#34d399", bar: "#059669" },
      "B+": { bg: "#60a5fa22", border: "#60a5fa", text: "#60a5fa", bar: "#2563eb" },
    };

    const STATUS_META = {
      "on-track": { label: "On Track", icon: "✅", color: "#34d399", bg: "#34d39922", border: "#34d39966" },
      "behind":   { label: "Behind", icon: "⚠️", color: "#fbbf24", bg: "#fbbf2422", border: "#fbbf2466" },
      "critical": { label: "Critical", icon: "❗", color: "#f87171", bg: "#f8717122", border: "#f8717166" },
    };

    const fmt = (n) => {
      if (n == null) return "—";
      const abs = Math.abs(n);
      const sign = n < 0 ? "-" : "";
      if (abs >= 1_000_000_000) return sign + (abs / 1_000_000_000).toFixed(2) + "B";
      if (abs >= 1_000_000) return sign + (abs / 1_000_000).toFixed(2) + "M";
      if (abs >= 1_000) return sign + (abs / 1_000).toFixed(1) + "K";
      return sign + Number(abs).toLocaleString();
    };

    const fmtFull = (n) => (n == null ? "—" : Number(n).toLocaleString());
    const fmtSigned = (n) => {
      if (n == null) return "—";
      return `${n >= 0 ? "+" : ""}${fmt(n)}`;
    };
    const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
    const gainColor = (n) => n == null ? "#6b7280" : n > 0 ? "#34d399" : n < 0 ? "#f87171" : "#9ca3af";

    function isSameCalendarDay(a, b) {
      return (
        a &&
        b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    function getJsonLoadMeta(entry, cdata, now) {
      if (!entry.id) {
        return { label: "⏳ Not Configured", color: "#6b7280", sub: "Club JSON not set up yet" };
      }

      if (!cdata) {
        return { label: "❌ No JSON", color: "#f87171", sub: "No JSON file loaded" };
      }

      const effectiveTimestamp = cdata.refreshedAt || cdata.sourceUpdatedAt || cdata.lastFetch || null;
      if (!effectiveTimestamp) {
        return { label: "⚠️ Outdated", color: "#fbbf24", sub: "Missing refresh timestamp" };
      }

      const parsed = new Date(effectiveTimestamp);
      if (Number.isNaN(parsed.getTime())) {
        return { label: "⚠️ Outdated", color: "#fbbf24", sub: "Invalid refresh timestamp" };
      }

      const prefix = cdata.refreshedAt ? "Refreshed" : "Source updated";
      if (isSameCalendarDay(parsed, now)) {
        return { label: "✅ JSON Loaded", color: "#34d399", sub: `${prefix} ${parsed.toLocaleString()}` };
      }

      return { label: "⚠️ Outdated", color: "#fbbf24", sub: `${cdata.refreshedAt ? "Last refresh" : "Last source update"} ${parsed.toLocaleString()}` };
    }

    function getPodiumStyle(index) {
      if (index === 0) return { color: "#fbbf24", textShadow: "0 0 10px rgba(251,191,36,0.15)" };
      if (index === 1) return { color: "#d1d5db", textShadow: "0 0 10px rgba(209,213,219,0.12)" };
      if (index === 2) return { color: "#d97706", textShadow: "0 0 10px rgba(217,119,6,0.12)" };
      if (index === 3) return { color: "#9ca3af", textShadow: "none" };
      return { color: "#6b7280", textShadow: "none" };
    }

    function getLineColor(index) {
      const hue = (index * 47) % 360;
      return `hsl(${hue}, 72%, 62%)`;
    }

    function parseJSON(raw) {
      let json;
      try {
        json = typeof raw === "string" ? JSON.parse(raw.trim()) : raw;
      } catch (e) {
        return { error: "Invalid JSON: " + e.message };
      }

      const membersArr = Array.isArray(json)
        ? json
        : Array.isArray(json.members)
        ? json.members
        : Array.isArray(json.data?.members)
        ? json.data.members
        : null;

      if (!membersArr || membersArr.length === 0) {
        return { error: "No members array found. Keys in JSON: " + Object.keys(json).join(", ") };
      }

      const now = new Date();
      const dataDate = new Date(now);
      dataDate.setDate(dataDate.getDate() - 1);
      const today = dataDate.getDate();
      const dim = daysInMonth(dataDate.getFullYear(), dataDate.getMonth() + 1);

      const members = membersArr.map((m) => {
        if (m.fan_count != null) {
          return {
            name: m.name || m.trainer_name || "Unknown",
            fans: m.fan_count,
            dailyGain: m.daily_gain ?? null,
            monthlyGain: m.monthly_gain ?? null,
            projected: m.projected_monthly ?? null,
            isActive: m.isActive !== false,
            dailyFans: Array.isArray(m.daily_fans) ? m.daily_fans : [],
          };
        }

        const df = Array.isArray(m.daily_fans) ? m.daily_fans : [];
        const todayIdx = Math.min(today - 1, df.length - 1);
        let currentFans = 0;
        let latestIdx = -1;

        for (let i = todayIdx; i >= 0; i--) {
          if (df[i] > 0) {
            currentFans = df[i];
            latestIdx = i;
            break;
          }
        }

        let dailyGain = null;
        if (latestIdx >= 1) {
          for (let i = latestIdx - 1; i >= 0; i--) {
            if (df[i] > 0) {
              dailyGain = currentFans - df[i];
              break;
            }
          }
        }

        const firstNZ = df.find((v) => v > 0);
        const monthlyGain = firstNZ != null && currentFans > 0 ? currentFans - firstNZ : null;
        const daysWithData = df.slice(0, todayIdx + 1).filter((v) => v > 0).length;
        let projected = null;

        if (monthlyGain !== null && daysWithData > 0) {
          projected = Math.round((monthlyGain / Math.max(daysWithData, 1)) * dim);
        } else if (dailyGain !== null) {
          projected = Math.round(dailyGain * dim);
        }

        return {
          name: m.trainer_name || m.name || "Unknown",
          fans: currentFans,
          dailyGain,
          monthlyGain,
          projected,
          isActive: m.isActive !== false,
          dailyFans: df,
        };
      });

      const clubName = json?.circle?.name || json?.name || "Unknown";
      const refreshedAt = json?.refreshed_at || json?.meta?.refreshed_at || null;
      const sourceUpdatedAt = json?.circle?.last_updated || json?.circle?.yesterday_updated || null;
      const lastFetch = refreshedAt || sourceUpdatedAt || null;
      return { members, clubName, lastFetch, refreshedAt, sourceUpdatedAt };
    }

    function buildCumulativeSeries(dailyFans, dim) {
      const df = Array.isArray(dailyFans) ? dailyFans : [];
      const series = [];
      let baseline = null;
      let lastSeen = 0;

      for (let i = 0; i < dim; i++) {
        const raw = Number(df[i] ?? 0);

        if (baseline == null) {
          if (raw > 0) {
            baseline = raw;
            lastSeen = raw;
            series.push(0);
          } else {
            series.push(0);
          }
          continue;
        }

        if (raw > 0) {
          lastSeen = raw;
        }

        series.push(Math.max(0, lastSeen - baseline));
      }

      return series;
    }

    function getMonthWeeks(year, monthIndex) {
      const dim = daysInMonth(year, monthIndex + 1);
      const weeks = [];
      let day = 1;

      while (day <= dim) {
        const date = new Date(year, monthIndex, day);
        const weekday = date.getDay();
        const offsetToSaturday = (6 - weekday + 7) % 7;
        const endDay = Math.min(dim, day + offsetToSaturday);

        weeks.push({
          index: weeks.length,
          number: weeks.length + 1,
          startDay: day,
          endDay,
          dayCount: endDay - day + 1,
        });

        day = endDay + 1;
      }

      return weeks;
    }

    function findWeekForDay(weeks, day) {
      return weeks.find((week) => day >= week.startDay && day <= week.endDay) || weeks[weeks.length - 1];
    }

    function getDateLabel(year, monthIndex, day) {
      return new Date(year, monthIndex, day).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function getWeekLabel(week, year, monthIndex) {
      if (!week) return "—";
      return `${getDateLabel(year, monthIndex, week.startDay)} – ${getDateLabel(year, monthIndex, week.endDay)}`;
    }

    function getPlanMetrics(monthlyGain, monthlyTarget, today, dim, weeks) {
      const safeGain = monthlyGain ?? 0;
      const dailyTarget = monthlyTarget > 0 ? monthlyTarget / dim : 0;
      const expectedToDate = Math.round(dailyTarget * today);
      const delta = safeGain - expectedToDate;
      const ratio = expectedToDate > 0 ? safeGain / expectedToDate : 1;

      let statusKey = "on-track";
      if (expectedToDate > 0 && ratio < 0.25) {
        statusKey = "critical";
      } else if (expectedToDate > 0 && ratio < 1) {
        statusKey = "behind";
      }

      const currentWeek = findWeekForDay(weeks, today);
      const currentWeekTarget = currentWeek ? Math.round(dailyTarget * currentWeek.dayCount) : 0;
      const currentWeekElapsedDays = currentWeek ? Math.max(0, today - currentWeek.startDay + 1) : 0;
      const currentWeekExpectedToDate = Math.round(dailyTarget * currentWeekElapsedDays);
      const currentWeekCheckpointTarget = currentWeek ? Math.round(dailyTarget * currentWeek.endDay) : expectedToDate;

      return {
        dailyTarget,
        expectedToDate,
        delta,
        ratio,
        statusKey,
        status: STATUS_META[statusKey].label,
        currentWeek,
        currentWeekTarget,
        currentWeekElapsedDays,
        currentWeekExpectedToDate,
        currentWeekCheckpointTarget,
      };
    }

    function deltaText(delta) {
      if (delta == null) return "—";
      if (delta === 0) return "0";
      return fmtSigned(delta);
    }

    function buildDailyGainSeries(cumulativeSeries = []) {
      return cumulativeSeries.map((value, index) => value - (index > 0 ? (cumulativeSeries[index - 1] ?? 0) : 0));
    }

    function getTrailingAverage(values = [], endIndex = null, windowSize = 3) {
      if (!values.length) return 0;
      const finalIndex = Math.max(0, Math.min(values.length - 1, endIndex == null ? values.length - 1 : endIndex));
      const slice = values.slice(Math.max(0, finalIndex - windowSize + 1), finalIndex + 1);
      if (!slice.length) return 0;
      return Math.round(slice.reduce((sum, value) => sum + (value || 0), 0) / slice.length);
    }

    async function svgToPngBlob(svgEl, scale = 2) {
      if (!svgEl) return null;

      const clone = svgEl.cloneNode(true);
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

      const viewBox = svgEl.viewBox?.baseVal;
      const width = viewBox?.width || svgEl.clientWidth || 980;
      const height = viewBox?.height || svgEl.clientHeight || 360;
      const svgString = new XMLSerializer().serializeToString(clone);
      const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
      const svgUrl = URL.createObjectURL(svgBlob);

      try {
        const img = await new Promise((resolve, reject) => {
          const nextImg = new Image();
          nextImg.onload = () => resolve(nextImg);
          nextImg.onerror = reject;
          nextImg.src = svgUrl;
        });

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0a0912";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        return await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      } finally {
        URL.revokeObjectURL(svgUrl);
      }
    }

    function downloadBlob(blob, filename) {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function safeFilename(value) {
      return String(value || "graph")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "graph";
    }

    function ProgressBar({ pct, color = "#7c3aed", height = 8 }) {
      return (
        <div style={{ background: "#1a1730", borderRadius: 99, height, overflow: "hidden", width: "100%" }}>
          <div
            style={{
              width: `${Math.min(100, Math.max(0, pct || 0))}%`,
              height: "100%",
              background: color,
              borderRadius: 99,
              transition: "width 0.5s ease",
            }}
          />
        </div>
      );
    }

    function TierBadge({ tier }) {
      const c = TIER_COLORS[tier] || TIER_COLORS["B+"];
      return (
        <span
          style={{
            background: c.bg,
            border: `1px solid ${c.border}`,
            color: c.text,
            borderRadius: 6,
            padding: "2px 8px",
            fontSize: 11,
            fontWeight: 800,
          }}
        >
          {tier}
        </span>
      );
    }

    function StatusBadge({ statusKey }) {
      const meta = STATUS_META[statusKey] || STATUS_META["behind"];
      return (
        <span
          style={{
            background: meta.bg,
            border: `1px solid ${meta.border}`,
            color: meta.color,
            borderRadius: 6,
            padding: "2px 8px",
            fontSize: 10,
            fontWeight: 800,
            whiteSpace: "nowrap",
          }}
        >
          {meta.icon} {meta.label}
        </span>
      );
    }

    function Sparkline({ data = [], width = 90, height = 26 }) {
      const vals = data.filter((v) => v > 0);
      if (vals.length < 2) return <span style={{ color: "#4b5563", fontSize: 10 }}>—</span>;

      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min || 1;
      const step = width / (vals.length - 1);

      const pts = vals
        .map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`)
        .join(" ");

      const lx = (vals.length - 1) * step;
      const ly = height - ((vals[vals.length - 1] - min) / range) * (height - 4) - 2;

      return (
        <svg width={width} height={height}>
          <polyline points={pts} fill="none" stroke="#7c3aed" strokeWidth={1.5} strokeLinejoin="round" />
          <circle cx={lx} cy={ly} r={2.5} fill="#c4b5fd" />
        </svg>
      );
    }

    function PaceChart({ seriesList = [], targetSeries = [], weeks = [], year, monthIndex, svgRef, zoom = 1 }) {
      const [hoverIdx, setHoverIdx] = useState(null);

      if (!targetSeries.length) {
        return (
          <div style={{ color: "#6b7280", fontSize: 12, padding: "18px 0" }}>
            Not enough daily data to render the pace chart yet.
          </div>
        );
      }

      const width = 980;
      const height = 360;
      const padding = { top: 24, right: 28, bottom: 42, left: 62 };
      const innerW = width - padding.left - padding.right;
      const innerH = height - padding.top - padding.bottom;
      const dayCount = targetSeries.length;
      const allValues = [...targetSeries, ...seriesList.flatMap((item) => item.series || [])];
      const maxVal = Math.max(...allValues, 1);

      const xForIndex = (index) => padding.left + (dayCount <= 1 ? 0 : (index / (dayCount - 1)) * innerW);
      const yForValue = (value) => padding.top + innerH - ((value || 0) / maxVal) * innerH;
      const pathFor = (series) =>
        series
          .map((value, index) => `${index === 0 ? "M" : "L"} ${xForIndex(index)} ${yForValue(value)}`)
          .join(" ");

      const gridValues = Array.from({ length: 5 }, (_, index) => Math.round((maxVal / 4) * index));
      const hoverMembers = hoverIdx != null
        ? [...seriesList]
            .map((item) => ({
              ...item,
              value: item.series?.[hoverIdx] ?? 0,
              delta: (item.series?.[hoverIdx] ?? 0) - (targetSeries[hoverIdx] ?? 0),
            }))
            .sort((a, b) => (b.value ?? 0) - (a.value ?? 0))
        : [];
      const hover = hoverIdx != null
        ? {
            day: hoverIdx + 1,
            target: targetSeries[hoverIdx] ?? 0,
            x: xForIndex(hoverIdx),
            yTarget: yForValue(targetSeries[hoverIdx] ?? 0),
          }
        : null;
      const tooltipLeftPct = hover ? Math.max(14, Math.min(86, (hover.x / width) * 100)) : 50;
      const tooltipTranslateX = tooltipLeftPct > 78 ? "-100%" : tooltipLeftPct < 22 ? "0" : "-50%";

      return (
        <div style={{ position: "relative", overflow: "visible" }}>
          <div style={{ overflowX: "auto", paddingBottom: 6 }}>
            <svg
              ref={svgRef}
              viewBox={`0 0 ${width} ${height}`}
              style={{
                width: `${Math.max(100, zoom * 100)}%`,
                minWidth: `${Math.round(width * Math.max(1, zoom))}px`,
                height: "auto",
                display: "block",
              }}
            >
              {gridValues.map((value, index) => {
                const y = yForValue(value);
                return (
                  <g key={index}>
                    <line x1={padding.left} x2={width - padding.right} y1={y} y2={y} stroke="#1e1b35" strokeDasharray="4 4" />
                    <text x={padding.left - 10} y={y + 4} textAnchor="end" fill="#6b7280" fontSize="10">
                      {fmt(value)}
                    </text>
                  </g>
                );
              })}

              {weeks.map((week) => {
                const x = xForIndex(week.endDay - 1);
                return (
                  <g key={week.number}>
                    <line x1={x} x2={x} y1={padding.top} y2={height - padding.bottom} stroke="#2a2540" strokeDasharray="3 5" />
                    <text x={x - 4} y={padding.top + 12} textAnchor="end" fill="#6b7280" fontSize="10">
                      W{week.number}
                    </text>
                  </g>
                );
              })}

              <path d={pathFor(targetSeries)} fill="none" stroke="#c4b5fd" strokeWidth="2.5" strokeDasharray="7 6" />

              {seriesList.map((item) => (
                <path
                  key={item.name}
                  d={pathFor(item.series)}
                  fill="none"
                  stroke={item.color}
                  strokeWidth="2"
                  opacity="0.9"
                />
              ))}

              {hover && (
                <>
                  <line x1={hover.x} x2={hover.x} y1={padding.top} y2={height - padding.bottom} stroke="#7c3aed" strokeDasharray="2 4" />
                  <circle cx={hover.x} cy={hover.yTarget} r="4" fill="#c4b5fd" />
                  {hoverMembers.map((item) => (
                    <circle
                      key={item.name}
                      cx={hover.x}
                      cy={yForValue(item.value)}
                      r="3"
                      fill={item.color}
                      stroke="#0a0912"
                      strokeWidth="1"
                    />
                  ))}
                </>
              )}

              {Array.from({ length: dayCount }, (_, index) => {
                const startX = index === 0 ? padding.left : (xForIndex(index - 1) + xForIndex(index)) / 2;
                const endX = index === dayCount - 1 ? width - padding.right : (xForIndex(index) + xForIndex(index + 1)) / 2;

                return (
                  <g key={index}>
                    <rect
                      x={startX}
                      y={padding.top}
                      width={Math.max(10, endX - startX)}
                      height={innerH}
                      fill="transparent"
                      onMouseEnter={() => setHoverIdx(index)}
                      onMouseLeave={() => setHoverIdx(null)}
                    />
                    {(index === 0 || index === dayCount - 1 || ((index + 1) % 5 === 0)) && (
                      <text x={xForIndex(index)} y={height - padding.bottom + 18} textAnchor="middle" fill="#6b7280" fontSize="10">
                        {index + 1}
                      </text>
                    )}
                  </g>
                );
              })}
            </svg>
          </div>

          {hover && (
            <div
              style={{
                position: "absolute",

          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 10, color: "#9ca3af", fontSize: 11 }}>

              <span style={{ width: 14, height: 3, background: "#c4b5fd", borderRadius: 99, display: "inline-block" }} />
              Weekly plan guideline
            </span>
            {seriesList.map((item) => (
              <span key={item.name} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 14, height: 3, background: item.color, borderRadius: 99, display: "inline-block" }} />
                {item.name}
              </span>
            ))}
          </div>
        </div>
      );
    }

    function CircleTracker() {
      const now = new Date();
      const dataDate = new Date(now);
      dataDate.setDate(dataDate.getDate() - 1);
      const year = dataDate.getFullYear();
      const monthIndex = dataDate.getMonth();
      const today = dataDate.getDate();
      const dim = daysInMonth(year, monthIndex + 1);
      const daysLeft = dim - today;
      const monthWeeks = getMonthWeeks(year, monthIndex);

      const [view, setView] = useState("home");
      const [activeIdx, setActiveIdx] = useState(0);
      const [clubData, setClubData] = useState({});
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [tab, setTab] = useState("dashboard");
      const [copied, setCopied] = useState(false);
      const [reminderCopied, setReminderCopied] = useState(false);
      const [debugLog, setDebugLog] = useState([]);
      const [memberSort, setMemberSort] = useState({ key: "monthlyGain", direction: "desc" });
      const [memberFilters, setMemberFilters] = useState({ name: "", status: "" });
      const [overviewStatusFilter, setOverviewStatusFilter] = useState("");
      const [paceHiddenMembers, setPaceHiddenMembers] = useState({});
      const [paceZoom, setPaceZoom] = useState(1);
      const [paceExporting, setPaceExporting] = useState(false);
      const [topNetworkMode, setTopNetworkMode] = useState("daily");
      const [criticalClubFilter, setCriticalClubFilter] = useState("all");
      const [criticalSort, setCriticalSort] = useState({ key: "planDelta", direction: "asc" });
      const paceSvgRef = useRef(null);

      const club = CLUBS[activeIdx];
      const cid = club.id;
      const data = cid ? (clubData[cid] || null) : null;
      const allMembers = data?.members || [];
      const activeMembers = allMembers.filter((m) => m.isActive !== false);
      const tc = TIER_COLORS[club.tier] || TIER_COLORS["B+"];
      const clubName = data?.clubName || club.name;
      const displayFetch = data?.refreshedAt || data?.sourceUpdatedAt || data?.lastFetch || null;
      const displayFetchLabel = data?.refreshedAt ? "Refreshed" : "Source updated";

      async function fetchData(idOverride = null, silent = false) {
        const targetId = idOverride || cid;
        if (!targetId) return;

        if (!silent) {
          setLoading(true);
          setErr("");
        }

        const log = [];
        const candidates = [`./data/${targetId}.json`, `/data/${targetId}.json`];

        for (const url of candidates) {
          try {
            const res = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
            log.push(`${res.ok ? "✓" : "✗"} ${url} → ${res.status}`);

            if (!res.ok) continue;

            const text = await res.text();
            const result = parseJSON(text);

            if (result.error) {
              log.push("  ↳ " + result.error);
              continue;
            }

            setClubData((prev) => ({
              ...prev,
              [targetId]: {
                members: result.members,
                clubName: result.clubName,
                lastFetch: result.lastFetch || null,
                refreshedAt: result.refreshedAt || null,
                sourceUpdatedAt: result.sourceUpdatedAt || null,
              },
            }));

            setDebugLog(log);
            if (!silent) setLoading(false);
            return;
          } catch (e) {
            log.push(`✗ ${url} → ${e.message}`);
          }
        }

        setDebugLog(log);
        if (!silent) {
          setErr(`Failed to load repo JSON for ${targetId}. Make sure data/${targetId}.json exists.`);
          setLoading(false);
        }
      }

      async function loadAllData() {
        setLoading(true);
        setErr("");
        const allLogs = [];
        const next = {};

        for (const c of CLUBS) {
          if (!c.id) continue;
          const candidates = [`./data/${c.id}.json`, `/data/${c.id}.json`];
          let loaded = false;

          for (const url of candidates) {
            try {
              const res = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
              allLogs.push(`${res.ok ? "✓" : "✗"} ${url} → ${res.status}`);

              if (!res.ok) continue;

              const text = await res.text();
              const result = parseJSON(text);

              if (result.error) {
                allLogs.push(`  ↳ ${c.id}: ${result.error}`);
                continue;
              }

              next[c.id] = {
                members: result.members,
                clubName: result.clubName,
                lastFetch: result.lastFetch || null,
                refreshedAt: result.refreshedAt || null,
                sourceUpdatedAt: result.sourceUpdatedAt || null,
              };
              loaded = true;
              break;
            } catch (e) {
              allLogs.push(`✗ ${url} → ${e.message}`);
            }
          }

          if (!loaded) {
            allLogs.push(`⚠ ${c.id} not loaded`);
          }
        }

        setClubData(next);
        setDebugLog(allLogs);
        setLoading(false);
      }

      useEffect(() => {
        loadAllData();
      }, []);

      useEffect(() => {
        if (cid && !clubData[cid]) {
          fetchData(cid, true);
        }
      }, [activeIdx]);

      useEffect(() => {
        setPaceHiddenMembers({});
        setOverviewStatusFilter("");
        setPaceZoom(1);
      }, [cid]);

      function decorateMember(member, monthlyTarget) {
        const cumulativeSeries = buildCumulativeSeries(member.dailyFans, dim);
        const dailyGainSeries = buildDailyGainSeries(cumulativeSeries);
        const plan = getPlanMetrics(member.monthlyGain ?? 0, monthlyTarget, today, dim, monthWeeks);

        return {
          ...member,
          cumulativeSeries,
          dailyGainSeries,
          rolling3DayAvg: getTrailingAverage(dailyGainSeries, today - 1, 3),
          fansNeededForPlan: Math.max(0, monthlyTarget - (member.monthlyGain ?? 0)),
          plan,
        };
      }

      const decoratedMembers = activeMembers.map((member) => decorateMember(member, club.target));
      const totalFans = decoratedMembers.reduce((sum, member) => sum + (member.fans || 0), 0);
      const totalDaily = decoratedMembers.reduce((sum, member) => sum + (member.dailyGain ?? 0), 0);
      const totalMonthly = decoratedMembers.reduce((sum, member) => sum + (member.monthlyGain ?? 0), 0);
      const totalProj = decoratedMembers.reduce((sum, member) => sum + (member.projected ?? 0), 0);
      const clubMonthlyTarget = decoratedMembers.length * club.target;
      const clubExpectedToDate = Math.round((clubMonthlyTarget / Math.max(dim, 1)) * today);
      const clubWeeklyDelta = totalMonthly - clubExpectedToDate;

      const statusCounts = decoratedMembers.reduce(
        (acc, member) => {
          acc[member.plan.statusKey] += 1;
          return acc;
        },
        { "on-track": 0, "behind": 0, "critical": 0 }
      );

      const membersOnTrack = statusCounts["on-track"];
      const sortedByMonthly = [...decoratedMembers].sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0));
      const overviewMembers = overviewStatusFilter
        ? sortedByMonthly.filter((member) => member.plan.statusKey === overviewStatusFilter)
        : sortedByMonthly;

      const individualTargetSeries = Array.from({ length: dim }, (_, idx) =>
        Math.round((club.target / Math.max(dim, 1)) * (idx + 1))
      );
      const allPaceSeriesList = decoratedMembers.map((member, index) => ({
        name: member.name,
        statusKey: member.plan.statusKey,
        color: getLineColor(index),
        series: member.cumulativeSeries,
      }));
      const paceSeriesList = allPaceSeriesList.filter((item) => !paceHiddenMembers[item.name]);

      const networkClubs = CLUBS.map((entry) => {
        const cdata = entry.id ? clubData[entry.id] : null;
        const cMembers = (cdata?.members || []).filter((member) => member.isActive !== false);
        const decorated = cMembers.map((member) => decorateMember(member, entry.target));
        const clubStatusCounts = decorated.reduce(
          (acc, member) => {
            acc[member.plan.statusKey] += 1;
            return acc;
          },
          { "on-track": 0, "behind": 0, "critical": 0 }
        );

        return {
          ...entry,
          clubName: cdata?.clubName || entry.name,
          activeMembers: decorated.length,
          totalFans: decorated.reduce((sum, member) => sum + (member.fans || 0), 0),
          totalMonthly: decorated.reduce((sum, member) => sum + (member.monthlyGain ?? 0), 0),
          totalProjected: decorated.reduce((sum, member) => sum + (member.projected ?? 0), 0),
          totalExpected: Math.round((decorated.length * entry.target / Math.max(dim, 1)) * today),
          hasData: Boolean(cdata),
          lastFetch: cdata?.lastFetch || null,
          refreshedAt: cdata?.refreshedAt || null,
          sourceUpdatedAt: cdata?.sourceUpdatedAt || null,
          jsonMeta: getJsonLoadMeta(entry, cdata, now),
          statusCounts: clubStatusCounts,
          topFiveMembers: [...decorated].sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0)).slice(0, 5),
        };
      });

      const networkMembers = networkClubs
        .filter((entry) => entry.id && clubData[entry.id])
        .flatMap((entry) => {
          const members = (clubData[entry.id]?.members || [])
            .filter((member) => member.isActive !== false)
            .map((member) => ({
              ...decorateMember(member, entry.target),
              clubName: clubData[entry.id]?.clubName || entry.name,
              clubTier: entry.tier,
              clubTarget: entry.target,
            }));

          return members;
        })
        .sort((a, b) => {
          const monthDiff = (b.monthlyGain ?? Number.NEGATIVE_INFINITY) - (a.monthlyGain ?? Number.NEGATIVE_INFINITY);
          if (monthDiff !== 0) return monthDiff;
          const projectedDiff = (b.projected ?? Number.NEGATIVE_INFINITY) - (a.projected ?? Number.NEGATIVE_INFINITY);
          if (projectedDiff !== 0) return projectedDiff;
          return (a.name || "").localeCompare(b.name || "");
        });

      const topNetworkUsers = [...networkMembers]
        .sort((a, b) => {
          if (topNetworkMode === "monthly") {
            const monthDiff = (b.monthlyGain ?? Number.NEGATIVE_INFINITY) - (a.monthlyGain ?? Number.NEGATIVE_INFINITY);
            if (monthDiff !== 0) return monthDiff;
            const dayDiff = (b.dailyGain ?? Number.NEGATIVE_INFINITY) - (a.dailyGain ?? Number.NEGATIVE_INFINITY);
            if (dayDiff !== 0) return dayDiff;
          } else {
            const dayDiff = (b.dailyGain ?? Number.NEGATIVE_INFINITY) - (a.dailyGain ?? Number.NEGATIVE_INFINITY);
            if (dayDiff !== 0) return dayDiff;
            const monthDiff = (b.monthlyGain ?? Number.NEGATIVE_INFINITY) - (a.monthlyGain ?? Number.NEGATIVE_INFINITY);
            if (monthDiff !== 0) return monthDiff;
          }
          return (a.name || "").localeCompare(b.name || "");
        })
        .slice(0, 10);
      const loadedClubCount = networkClubs.filter((entry) => entry.hasData).length;
      const networkMonthlyTotal = networkMembers.reduce((sum, member) => sum + (member.monthlyGain ?? 0), 0);
      const networkFanTotal = networkMembers.reduce((sum, member) => sum + (member.fans || 0), 0);
      const networkMemberCount = networkMembers.length;
      const clubsMissingData = networkClubs.filter((entry) => entry.id && !entry.hasData).length;
      const networkStatusCounts = networkMembers.reduce(
        (acc, member) => {
          acc[member.plan.statusKey] += 1;
          return acc;
        },
        { "on-track": 0, "behind": 0, "critical": 0 }
      );
      const networkMembersAtOrAbovePlan = networkStatusCounts["on-track"];
      const criticalClubOptions = Array.from(new Set(networkMembers.filter((member) => member.plan.statusKey === "critical").map((member) => member.clubName))).sort((a, b) => a.localeCompare(b));
      const criticalAvgColor = (value) => value <= 0 ? "#f87171" : value < 200000 ? "#fbbf24" : "#34d399";
      const criticalBaseMembers = [...networkMembers]
        .filter((member) => member.plan.statusKey === "critical")
        .filter((member) => criticalClubFilter === "all" || member.clubName === criticalClubFilter);

      const criticalNetworkMembers = criticalSort.key && criticalSort.direction !== "off"
        ? [...criticalBaseMembers].sort((a, b) => {
            const getValue = (member) => {
              switch (criticalSort.key) {
                case "projected":
                  return member.projected ?? Number.NEGATIVE_INFINITY;
                case "rolling3DayAvg":
                  return member.rolling3DayAvg ?? Number.NEGATIVE_INFINITY;
                case "fansNeeded":
                  return member.fansNeededForPlan ?? Number.NEGATIVE_INFINITY;
                case "planDelta":
                default:
                  return member.plan.delta ?? Number.NEGATIVE_INFINITY;
              }
            };

            const av = getValue(a);
            const bv = getValue(b);
            if (av === bv) return (a.name || "").localeCompare(b.name || "");
            return criticalSort.direction === "asc" ? av - bv : bv - av;
          })
        : criticalBaseMembers;

      function toggleCriticalSort(key) {
        setCriticalSort((prev) => {
          if (prev.key !== key || prev.direction === "off") {
            return { key, direction: "desc" };
          }
          if (prev.direction === "desc") {
            return { key, direction: "asc" };
          }
          return { key: null, direction: "off" };
        });
      }

      function criticalSortLabel(key) {
        if (criticalSort.key !== key || criticalSort.direction === "off") return "OFF";
        return criticalSort.direction === "asc" ? "ASC" : "DESC";
      }

      function buildDiscord() {
        const P = (s, n) => String(s).padStart(n);
        const PL = (s, n) => String(s).padEnd(n);
        const ds = dataDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        const sortedMembers = [...decoratedMembers].sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0));
        const statusShort = (statusKey) => statusKey === "on-track" ? "✅" : statusKey === "critical" ? "❗" : "⚠️";

        const headerLines = [
          `📊 **[${club.tier}] ${club.name} — Circle Report** | ${ds}`,
          `🎯 ${fmt(club.target)}/member · 👥 ${decoratedMembers.length}/${MAX_MEMBERS} active · 📅 Day ${today}/${dim}`,
          `📈 Club: ${fmtSigned(totalMonthly)} month · ${fmtSigned(clubWeeklyDelta)} vs plan`,
          `✅ ${statusCounts["on-track"]} · ⚠️ ${statusCounts["behind"]} · ❗ ${statusCounts["critical"]}`,
          "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
          "```",
          `${PL("MEMBER", 16)}${P("MONTH", 9)}${P("PLAN", 9)}${P("ST", 5)}`,
          "─".repeat(39),
        ];

        const rowLines = sortedMembers.map((member) =>
          `${PL(member.name.slice(0, 15), 16)}${P(fmtSigned(member.monthlyGain ?? 0), 9)}${P(fmtSigned(member.plan.delta ?? 0), 9)}${P(statusShort(member.plan.statusKey), 5)}`
        );
        rowLines.push("─".repeat(39));
        rowLines.push(`${PL("TOTAL", 16)}${P(fmtSigned(totalMonthly), 9)}${P(fmtSigned(clubWeeklyDelta), 9)}${P("—", 5)}`);

        const footerLines = [
          "```",
          `> 🤖 *Dominator Network Tracker · ${club.officer}*`,
        ];

        const limit = 3900;
        const keptRows = [];
        let omittedCount = 0;

        for (let i = 0; i < rowLines.length; i++) {
          const candidate = [...headerLines, ...keptRows, rowLines[i], ...footerLines].join("\n");
          if (candidate.length > limit) {
            omittedCount = Math.max(0, sortedMembers.length - keptRows.length);
            break;
          }
          keptRows.push(rowLines[i]);
        }

        if (omittedCount > 0) {
          const note = `… ${omittedCount} more members omitted to stay under Discord limit`;
          while ([...headerLines, ...keptRows, note, ...footerLines].join("\n").length > limit && keptRows.length > 0) {
            keptRows.pop();
          }
          keptRows.push(note);
        }

        return [...headerLines, ...keptRows, ...footerLines].join("\n");
      }

      async function copyDiscord() {
        const message = buildDiscord();
        let copiedWithImage = false;

        try {
          const shouldIncludeGraph = view === "club" && tab === "pace" && paceSvgRef.current;
          const pngBlob = shouldIncludeGraph ? await svgToPngBlob(paceSvgRef.current, 2) : null;

          if (pngBlob && window.ClipboardItem && navigator.clipboard?.write) {
            await navigator.clipboard.write([
              new ClipboardItem({
                "text/plain": new Blob([message], { type: "text/plain" }),
                "image/png": pngBlob,
              }),
            ]);
            copiedWithImage = true;
          } else {
            await navigator.clipboard.writeText(message);
          }
        } catch (error) {
          await navigator.clipboard.writeText(message);
        }

        setCopied(copiedWithImage ? "image" : "text");
        setTimeout(() => setCopied(false), 2200);
      }

      function buildReminderDiscord() {
        const ds = dataDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        const underPlanMembers = [...decoratedMembers]
          .filter((member) => member.plan.statusKey !== "on-track")
          .sort((a, b) => (a.plan.delta ?? 0) - (b.plan.delta ?? 0));

        const lines = [
          `🔔 **[${club.tier}] ${club.name} — Under Plan Reminder** | ${ds}`,
          `Members still under plan this week. Push for pace before ${getWeekLabel(currentWeek, year, monthIndex)} ends.`,
          "",
        ];

        if (!underPlanMembers.length) {
          lines.push("✅ Everyone is currently on track.");
          return lines.join("\n");
        }

        underPlanMembers.forEach((member) => {
          const meta = STATUS_META[member.plan.statusKey] || STATUS_META["behind"];
          lines.push(`${meta.icon} **${member.name}** — ${deltaText(member.plan.delta)} vs plan · ${fmt(member.fansNeededForPlan)} still needed this month`);
        });

        const footer = `\n> 🤖 *Dominator Network Tracker · ${club.officer}*`;
        let message = lines.join("\n") + footer;

        if (message.length > 3900) {
          const trimmed = [];
          for (const line of lines) {
            const candidate = [...trimmed, line].join("\n") + footer;
            if (candidate.length > 3900) break;
            trimmed.push(line);
          }
          const omitted = Math.max(0, underPlanMembers.length - Math.max(0, trimmed.length - 3));
          if (omitted > 0) trimmed.push(`… ${omitted} more members omitted to stay under Discord limit`);
          message = trimmed.join("\n") + footer;
        }

        return message;
      }

      async function copyReminderDiscord() {
        const message = buildReminderDiscord();
        await navigator.clipboard.writeText(message);
        setReminderCopied(true);
        setTimeout(() => setReminderCopied(false), 2200);
      }

      async function exportPaceGraph() {
        if (!paceSvgRef.current) return;
        setPaceExporting(true);
        try {
          const blob = await svgToPngBlob(paceSvgRef.current, 2);
          if (blob) {
            downloadBlob(blob, `${safeFilename(clubName)}-pace-chart.png`);
          }
        } finally {
          setPaceExporting(false);
        }
      }

      function openClub(index) {
        setActiveIdx(index);
        setErr("");
        setTab("dashboard");
        setView("club");
      }

      function toggleOverviewStatusFilter(statusKey) {
        setOverviewStatusFilter((prev) => prev === statusKey ? "" : statusKey);
      }

      function togglePaceMember(name) {
        setPaceHiddenMembers((prev) => ({ ...prev, [name]: !prev[name] }));
      }

      function showAllPaceMembers() {
        setPaceHiddenMembers({});
      }

      function hideAllPaceMembers() {
        const next = {};
        decoratedMembers.forEach((member) => {
          next[member.name] = true;
        });
        setPaceHiddenMembers(next);
      }

      function showOnlyPaceStatus(statusKey) {
        const next = {};
        decoratedMembers.forEach((member) => {
          next[member.name] = member.plan.statusKey !== statusKey;
        });
        setPaceHiddenMembers(next);
      }

      const SORTABLE_MEMBER_COLUMNS = ["fans", "dailyGain", "monthlyGain", "projected"];

      function updateMemberFilter(key, value) {
        setMemberFilters((prev) => ({ ...prev, [key]: value }));
      }

      function clearMemberFilters() {
        setMemberFilters({ name: "", status: "" });
        setMemberSort({ key: "monthlyGain", direction: "desc" });
      }

      function handleSort(key) {
        if (!SORTABLE_MEMBER_COLUMNS.includes(key)) return;

        setMemberSort((prev) => {
          if (prev.key !== key || prev.direction === "off") {
            return { key, direction: "desc" };
          }
          if (prev.direction === "desc") {
            return { key, direction: "asc" };
          }
          return { key: null, direction: "off" };
        });
      }

      function sortIndicator(key) {
        if (!SORTABLE_MEMBER_COLUMNS.includes(key)) return "";
        if (memberSort.key !== key || memberSort.direction === "off") return "OFF";
        return memberSort.direction === "asc" ? "ASC" : "DESC";
      }

      function matchesSelectFilter(value, filterValue) {
        if (!filterValue) return true;
        return String(value ?? "") === String(filterValue);
      }

      function getMemberSortValue(member, key) {
        return member[key] ?? Number.NEGATIVE_INFINITY;
      }

      const memberNameOptions = [...new Set(decoratedMembers.map((member) => member.name).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));

      const memberRows = (() => {
        const filtered = decoratedMembers.filter((member) =>
          matchesSelectFilter(member.name, memberFilters.name) &&
          matchesSelectFilter(member.plan.statusKey, memberFilters.status)
        );

        const sorted = memberSort.key && memberSort.direction !== "off"
          ? [...filtered].sort((a, b) => {
              const av = getMemberSortValue(a, memberSort.key);
              const bv = getMemberSortValue(b, memberSort.key);
              const dir = memberSort.direction === "asc" ? 1 : -1;

              if (av === bv) {
                return (a.name || "").localeCompare(b.name || "");
              }

              return ((av > bv) ? 1 : -1) * dir;
            })
          : filtered;

        return sorted.map((member, index) => ({
          member,
          rank: index + 1,
        }));

                          const sharedStyle = {
                            background: "#111028",
                            border: `1px solid ${isActive ? card.col : "#1e1b35"}`,
                            borderRadius: 12,
                            padding: "11px 14px",
                            boxShadow: isActive ? `0 0 0 1px ${card.col}33 inset` : "none",
                          };

                          return isFilterCard ? (
                            <button key={card.label} onClick={() => toggleOverviewStatusFilter(card.filterKey)} style={{ ...sharedStyle, textAlign: "left", cursor: "pointer" }}>
                              <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 3 }}>{card.label}</div>
                              <div style={{ color: card.col, fontSize: 18, fontWeight: 700 }}>{card.value}</div>
                              <div style={{ color: isActive ? card.col : "#4b5563", fontSize: 10, marginTop: 2 }}>{isActive ? "Showing only this status" : card.sub}</div>
                            </button>
                          ) : (
                            <div key={card.label} style={sharedStyle}>
                              <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 3 }}>{card.label}</div>
                              <div style={{ color: card.col, fontSize: 18, fontWeight: 700 }}>{card.value}</div>
                              <div style={{ color: "#4b5563", fontSize: 10, marginTop: 2 }}>{card.sub}</div>
                            </div>
                          );
                        })}
                      </div>

                      <div style={S.card}>
                        <div style={S.h2}>Member Progress — Sorted by Monthly Gain</div>
                        {overviewStatusFilter && (
                          <div style={{ color: STATUS_META[overviewStatusFilter]?.color || "#9ca3af", fontSize: 12, marginBottom: 10 }}>
                            Filtering overview to {STATUS_META[overviewStatusFilter]?.icon} {STATUS_META[overviewStatusFilter]?.label}. Click the same summary card again to clear.
                          </div>
                        )}
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {overviewMembers.length === 0 && (
                            <div style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 10, padding: "14px 16px", color: "#6b7280", fontSize: 12 }}>
                              No members match the current overview filter.
                            </div>
                          )}
                          {overviewMembers.map((member, index) => {
                            const monthPct = club.target > 0 ? Math.min(100, ((member.monthlyGain ?? 0) / club.target) * 100) : 0;
                            const stillNeed = Math.max(0, club.target - (member.monthlyGain ?? 0));
                            const statusMeta = STATUS_META[member.plan.statusKey] || STATUS_META["behind"];
                            const progressColor = statusMeta.color;

                            return (
                              <div key={`${member.name}-${index}`} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 10, padding: "12px 14px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7, flexWrap: "wrap", gap: 4 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ color: "#4b5563", fontSize: 11, fontWeight: 700, minWidth: 20 }}>#{index + 1}</span>
                                    <span style={{ fontWeight: 700, color: "#e2e0f0", fontSize: 13 }}>{member.name}</span>
                                    <StatusBadge statusKey={member.plan.statusKey} />
                                  </div>

                                  <div style={{ display: "flex", gap: 14, fontSize: 11, flexWrap: "wrap" }}>
                                    <span style={{ color: "#6b7280" }}>Today: <b style={{ color: gainColor(member.dailyGain) }}>{member.dailyGain != null ? fmtSigned(member.dailyGain) : "—"}</b></span>
                                    <span style={{ color: "#6b7280" }}>Month: <b style={{ color: gainColor(member.monthlyGain) }}>{member.monthlyGain != null ? fmtSigned(member.monthlyGain) : "—"}</b></span>
                                    <span style={{ color: "#6b7280" }}>Projected: <b style={{ color: "#c4b5fd" }}>{member.projected != null ? fmt(member.projected) : "—"}</b></span>
                                  </div>
                                </div>

                                <div style={{ marginBottom: 8 }}>
                                  <ProgressBar pct={monthPct} color={progressColor} height={9} />
                                </div>

                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10, alignItems: "center" }}>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Current Fans</div>
                                    <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 14 }}>{fmtFull(member.fans)}</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Target Progress</div>
                                    <div style={{ color: progressColor, fontWeight: 700, fontSize: 14 }}>{monthPct.toFixed(1)}%</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Still Needed</div>
                                    <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 14 }}>{fmt(stillNeed)}</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Vs Weekly Plan</div>
                                    <div style={{ color: progressColor, fontWeight: 700, fontSize: 14 }}>{deltaText(member.plan.delta)}</div>
                                  </div>
                                  <div style={{ justifySelf: "end" }}>
                                    <Sparkline data={member.dailyFans || []} />
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </>
                  )}

                  {tab === "members" && (
                    <div style={S.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                        <div>
                          <div style={S.h2}>Members</div>
                          <div style={{ color: "#6b7280", fontSize: 12 }}>
                            Name and Status use dropdown filters. Fans, Today, Month, and Projected cycle through Desc, Asc, and Off sorting.
                          </div>
                        </div>
                        <button style={S.btn(false)} onClick={clearMemberFilters}>Clear filters</button>
                      </div>

                      <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse" }}>
                          <thead>
                            <tr style={{ textAlign: "left" }}>
                              {[
                                { key: "rank", label: "#", sortable: false },
                                { key: "name", label: "Name", sortable: false },
                                { key: "fans", label: "Fans", sortable: true },
                                { key: "dailyGain", label: "Today", sortable: true },
                                { key: "monthlyGain", label: "Month", sortable: true },
                                { key: "projected", label: "Projected", sortable: true },
                                { key: "weeklyDelta", label: "Vs Weekly Plan", sortable: false },
                                { key: "status", label: "Status", sortable: false },
                              ].map((col) => (
                                <th key={col.key} style={S.th}>
                                  {col.sortable ? (
                                    <button
                                      style={{ background: "transparent", border: "none", color: "inherit", font: "inherit", cursor: "pointer", padding: 0, display: "inline-flex", gap: 6, alignItems: "center" }}
                                      onClick={() => handleSort(col.key)}
                                    >
                                      <span>{col.label}</span>
                                      <span style={{ color: memberSort.key === col.key ? tc.text : "#4b5563", fontSize: 10 }}>{sortIndicator(col.key)}</span>
                                    </button>
                                  ) : (
                                    <span>{col.label}</span>
                                  )}
                                </th>
                              ))}
                            </tr>
                            <tr>
                              <th style={S.th}></th>
                              <th style={S.th}>
                                <select style={S.input} value={memberFilters.name} onChange={(e) => updateMemberFilter("name", e.target.value)}>
                                  <option value="">All Members</option>
                                  {memberNameOptions.map((name) => (
                                    <option key={name} value={name}>{name}</option>
                                  ))}
                                </select>
                              </th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}>
                                <select style={S.input} value={memberFilters.status} onChange={(e) => updateMemberFilter("status", e.target.value)}>
                                  <option value="">All Statuses</option>
                                  <option value="on-track">On Track</option>
                                  <option value="behind">Behind</option>
                                  <option value="critical">Critical</option>
                                </select>
                              </th>
                            </tr>
                          </thead>
                          <tbody>
                            {memberRows.length === 0 ? (
                              <tr>
                                <td colSpan={8} style={{ ...S.td, color: "#6b7280", textAlign: "center", padding: "22px 8px" }}>
                                  No members match the current filters.
                                </td>
                              </tr>
                            ) : (
                              memberRows.map(({ member, rank }) => (
                                <tr key={`${member.name}-${rank}`}>
                                  <td style={{ ...S.td, color: "#6b7280" }}>{rank}</td>
                                  <td style={{ ...S.td, color: "#e2e0f0", fontWeight: 700 }}>{member.name}</td>
                                  <td style={S.td}>{fmtFull(member.fans)}</td>
                                  <td style={{ ...S.td, color: gainColor(member.dailyGain) }}>
                                    {member.dailyGain != null ? fmtSigned(member.dailyGain) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: gainColor(member.monthlyGain) }}>
                                    {member.monthlyGain != null ? fmtSigned(member.monthlyGain) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: "#c4b5fd" }}>
                                    {member.projected != null ? fmt(member.projected) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: (STATUS_META[member.plan.statusKey]?.color || gainColor(member.plan.delta)), fontWeight: 700 }}>
                                    {deltaText(member.plan.delta)}
                                  </td>
                                  <td style={S.td}>
                                    <StatusBadge statusKey={member.plan.statusKey} />
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                                    {tab === "pace" && (
                    <div style={S.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
                        <div>
                          <div style={S.h2}>Member Pace</div>
                          <div style={{ color: "#6b7280", fontSize: 12 }}>
                            Weeks start on Sunday and end on Saturday, shortened only at the 1st and last day of the month. Inactive members are fully excluded.
                          </div>
                        </div>
                        <div style={{ color: "#9ca3af", fontSize: 12 }}>
                          {getWeekLabel(currentWeek, year, monthIndex)}
                        </div>
                      </div>

                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10, marginBottom: 14 }}>
                        {[
                          { label: "Current Week", value: `Week ${currentWeek?.number || 1}`, sub: getWeekLabel(currentWeek, year, monthIndex), col: "#e2e0f0" },
                          { label: "Per-Member Target by Today", value: fmt(decoratedMembers[0]?.plan.expectedToDate ?? 0), sub: `${fmt(club.target)} monthly quota`, col: "#c4b5fd" },
                          { label: "Current Week Target", value: fmt(decoratedMembers[0]?.plan.currentWeekTarget ?? 0), sub: getWeekLabel(currentWeek, year, monthIndex), col: "#34d399" },
                          { label: `Visible on Graph`, value: `${paceSeriesList.length}/${allPaceSeriesList.length}`, sub: `${statusCounts["on-track"]} on track · ${statusCounts["critical"]} critical`, col: "#e2e0f0" },
                        ].map((card) => (
                          <div key={card.label} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 12, padding: "11px 14px" }}>
                            <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 3 }}>{card.label}</div>
                            <div style={{ color: card.col, fontSize: 18, fontWeight: 700 }}>{card.value}</div>
                            <div style={{ color: "#4b5563", fontSize: 10, marginTop: 2 }}>{card.sub}</div>
                          </div>
                        ))}
                      </div>

                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ color: "#9ca3af", fontSize: 12 }}>
                          Zoom the graph, export it as an image, or copy Discord text plus the graph when your browser supports image clipboard writes.
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <button style={S.btn(false)} onClick={() => setPaceZoom((prev) => Math.max(1, +(prev - 0.25).toFixed(2)))}>− Zoom</button>
                          <button style={S.btn(false)} onClick={() => setPaceZoom(1)}>Reset</button>
                          <button style={S.btn(false)} onClick={() => setPaceZoom((prev) => Math.min(3, +(prev + 0.25).toFixed(2)))}>+ Zoom</button>
                          <button style={S.btn(false)} onClick={exportPaceGraph}>{paceExporting ? "⟳ Exporting…" : "🖼️ Export Graph"}</button>
                        </div>
                      </div>

                      <PaceChart seriesList={paceSeriesList} targetSeries={individualTargetSeries} weeks={monthWeeks} year={year} monthIndex={monthIndex} svgRef={paceSvgRef} zoom={paceZoom} />

                      <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 10 }}>
                        {monthWeeks.map((week) => {
                          const checkpointTarget = Math.round((club.target / Math.max(dim, 1)) * week.endDay);
                          const currentValues = allPaceSeriesList
                            .map((item) => item.series?.[Math.max(0, week.endDay - 1)] ?? 0)
                            .sort((a, b) => b - a);
                          const medianValue = currentValues.length ? currentValues[Math.floor(currentValues.length / 2)] : 0;
                          const medianDelta = medianValue - checkpointTarget;
                          const onPaceAtCheckpoint = currentValues.filter((value) => value >= checkpointTarget).length;

                          return (
                            <div key={week.number} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 12, padding: "12px 13px" }}>
                              <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 13, marginBottom: 4 }}>Week {week.number}</div>
                              <div style={{ color: "#6b7280", fontSize: 11, marginBottom: 8 }}>{getWeekLabel(week, year, monthIndex)}</div>
                              <div style={{ color: "#6b7280", fontSize: 11 }}>Per-member target: <b style={{ color: "#c4b5fd" }}>{fmt(checkpointTarget)}</b></div>
                              <div style={{ color: "#6b7280", fontSize: 11 }}>
                                Median member actual: <b style={{ color: "#fbbf24" }}>{fmt(medianValue)}</b>{" "}
                                <span style={{ color: gainColor(medianDelta), fontWeight: 700 }}>({fmtSigned(medianDelta)})</span>
                              </div>
                              <div style={{ color: "#9ca3af", fontSize: 11, fontWeight: 700, marginTop: 5 }}>{onPaceAtCheckpoint}/{allPaceSeriesList.length} on pace at checkpoint</div>
                            </div>
                          );
                        })}
                      </div>

                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 16, marginBottom: 10 }}>
                        <div style={{ color: "#9ca3af", fontSize: 12 }}>
                          Click a member card to hide or show that member on the graph.
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <button style={S.btn(false)} onClick={showAllPaceMembers}>Show All</button>
                          <button style={S.btn(false)} onClick={hideAllPaceMembers}>Hide All</button>
                          <button style={S.btn(false, STATUS_META["on-track"].color)} onClick={() => showOnlyPaceStatus("on-track")}>{STATUS_META["on-track"].icon} On Track Only</button>
                          <button style={S.btn(false, STATUS_META["behind"].color)} onClick={() => showOnlyPaceStatus("behind")}>{STATUS_META["behind"].icon} Behind Only</button>
                          <button style={S.btn(false, STATUS_META["critical"].color)} onClick={() => showOnlyPaceStatus("critical")}>{STATUS_META["critical"].icon} Critical Only</button>
                        </div>
                      </div>

                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: 10 }}>
                        {sortedByMonthly.map((member, index) => {
                          const statusMeta = STATUS_META[member.plan.statusKey] || STATUS_META["behind"];
                          const isHidden = Boolean(paceHiddenMembers[member.name]);
                          const lineColor = allPaceSeriesList.find((item) => item.name === member.name)?.color || getLineColor(index);

                          return (
                            <button
                              key={`pace-card-${member.name}`}
                              onClick={() => togglePaceMember(member.name)}
                              style={{
                                background: isHidden ? "#0a0912" : "#0f0d1a",
                                border: `1px solid ${isHidden ? "#1e1b35" : statusMeta.border}`,
                                borderRadius: 12,
                                padding: "12px 13px",
                                textAlign: "left",
                                cursor: "pointer",
                                opacity: isHidden ? 0.55 : 1,
                                boxShadow: isHidden ? "none" : `0 0 0 1px ${statusMeta.bg} inset`,
                              }}
                            >
                              <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "center", marginBottom: 8 }}>
                                <div style={{ minWidth: 0 }}>
                                  <div style={{ color: "#e2e0f0", fontWeight: 800, fontSize: 13, display: "flex", alignItems: "center", gap: 7 }}>
                                    <span style={{ width: 10, height: 10, borderRadius: 999, background: lineColor, display: "inline-block", flexShrink: 0 }} />
                                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{member.name}</span>
                                  </div>
                                  <div style={{ color: "#6b7280", fontSize: 11, marginTop: 3 }}>{isHidden ? "Hidden from graph" : "Showing on graph"}</div>
                                </div>
                                <StatusBadge statusKey={member.plan.statusKey} />
                              </div>

                              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8 }}>
                                <div>
                                  <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Total Fans</div>
                                  <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 14 }}>{fmtFull(member.fans)}</div>
                                </div>
                                <div>
                                  <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Monthly Gain</div>
                                  <div style={{ color: statusMeta.color, fontWeight: 700, fontSize: 14 }}>{fmtSigned(member.monthlyGain ?? 0)}</div>
                                </div>
                                <div>
                                  <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Indicator</div>
                                  <div style={{ color: statusMeta.color, fontWeight: 700, fontSize: 14 }}>{statusMeta.icon} {statusMeta.label}</div>
                                </div>
                                <div>
                                  <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Vs Weekly Plan</div>
                                  <div style={{ color: statusMeta.color, fontWeight: 700, fontSize: 14 }}>{deltaText(member.plan.delta)}</div>
                                </div>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {tab === "debug" && (
                    <div style={S.card}>
                      <div style={S.h2}>Debug</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                        <button style={S.btn(false)} onClick={() => fetchData()}>Reload current club</button>
                        <button style={S.btn(false)} onClick={() => loadAllData()}>Reload all clubs</button>
                        <button style={S.btn(false)} onClick={() => setDebugLog([])}>Clear log</button>
                      </div>

                      <div style={{ color: "#9ca3af", fontSize: 12, marginBottom: 12, lineHeight: 1.7 }}>
                        This page reads JSON from your deployed repo files. Expected path for this club: <b style={{ color: "#e2e0f0" }}>data/{cid}.json</b>
                      </div>

                      <pre
                        style={{
                          whiteSpace: "pre-wrap",
                          wordBreak: "break-word",
                          background: "#0a0912",
                          border: "1px solid #1e1b35",
                          borderRadius: 10,
                          padding: 12,
                          color: "#c4b5fd",
                          fontSize: 12,
                          lineHeight: 1.55,
                        }}
                      >
{debugLog.length ? debugLog.join("\n") : "No debug entries yet."}
                      </pre>
                    </div>
                  )}
                </>
              )}
            </>
          )}
        </div>
      );
    }

    if (window.__ALLOW_APP__) {
      ReactDOM.createRoot(document.getElementById("root")).render(<CircleTracker />);
    }
  </script>

</body>
</html>
