  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CLUBS = [
      { tier: "S",  name: "Dominator",  officer: "@mikufans.",     id: "114037107", target: 75_000_000 },
      { tier: "S",  name: "Dominant H", officer: "@.stayk",        id: "278155676", target: 75_000_000 },
      { tier: "S",  name: "Dominance",  officer: "@mikufans.",     id: "955490905", target: 75_000_000 },
      { tier: "A+", name: "Dominate",   officer: "@reyovalt",      id: "147185239", target: 50_000_000 },
      { tier: "A+", name: "Domineer",   officer: "@patuazul",      id: "961801794", target: 50_000_000 },
      { tier: "A+", name: "Dominium",   officer: "@jkpokes",       id: "449007774", target: 50_000_000 },
      { tier: "A",  name: "Dominion",   officer: "@virsia",        id: "510137721", target: 30_000_000 },
      { tier: "A",  name: "Domical",    officer: "@mikufans.",     id: "754870359", target: 30_000_000 },
      { tier: "B+", name: "Domicile",   officer: "@goofyahhclown", id: "387070372", target: 20_000_000 },
      { tier: "B+", name: "Domichill",  officer: "@mikufans.",     id: null,        target: 20_000_000 },
    ];

    const MAX_MEMBERS = 30;
    const TIER_COLORS = {
      "S":  { bg: "#fbbf2422", border: "#fbbf24", text: "#fbbf24", bar: "#f59e0b" },
      "A+": { bg: "#a78bfa22", border: "#a78bfa", text: "#a78bfa", bar: "#7c3aed" },
      "A":  { bg: "#34d39922", border: "#34d399", text: "#34d399", bar: "#059669" },
      "B+": { bg: "#60a5fa22", border: "#60a5fa", text: "#60a5fa", bar: "#2563eb" },
    };

    const STATUS_META = {
      "on-track": { label: "On Track", color: "#34d399", bg: "#34d39922", border: "#34d39966" },
      "behind":   { label: "Behind",   color: "#fbbf24", bg: "#fbbf2422", border: "#fbbf2466" },
      "critical": { label: "Critical", color: "#f87171", bg: "#f8717122", border: "#f8717166" },
    };

    const fmt = (n) => {
      if (n == null) return "—";
      const abs = Math.abs(n);
      const sign = n < 0 ? "-" : "";
      if (abs >= 1_000_000_000) return sign + (abs / 1_000_000_000).toFixed(2) + "B";
      if (abs >= 1_000_000) return sign + (abs / 1_000_000).toFixed(2) + "M";
      if (abs >= 1_000) return sign + (abs / 1_000).toFixed(1) + "K";
      return sign + Number(abs).toLocaleString();
    };

    const fmtFull = (n) => (n == null ? "—" : Number(n).toLocaleString());
    const fmtSigned = (n) => {
      if (n == null) return "—";
      return `${n >= 0 ? "+" : ""}${fmt(n)}`;
    };
    const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
    const gainColor = (n) => n == null ? "#6b7280" : n > 0 ? "#34d399" : n < 0 ? "#f87171" : "#9ca3af";

    function parseJSON(raw) {
      let json;
      try {
        json = typeof raw === "string" ? JSON.parse(raw.trim()) : raw;
      } catch (e) {
        return { error: "Invalid JSON: " + e.message };
      }

      const membersArr = Array.isArray(json)
        ? json
        : Array.isArray(json.members)
        ? json.members
        : Array.isArray(json.data?.members)
        ? json.data.members
        : null;

      if (!membersArr || membersArr.length === 0) {
        return { error: "No members array found. Keys in JSON: " + Object.keys(json).join(", ") };
      }

      const now = new Date();
      const today = now.getDate();
      const dim = daysInMonth(now.getFullYear(), now.getMonth() + 1);

      const members = membersArr.map((m) => {
        if (m.fan_count != null) {
          return {
            name: m.name || m.trainer_name || "Unknown",
            fans: m.fan_count,
            dailyGain: m.daily_gain ?? null,
            monthlyGain: m.monthly_gain ?? null,
            projected: m.projected_monthly ?? null,
            isActive: m.isActive !== false,
            dailyFans: Array.isArray(m.daily_fans) ? m.daily_fans : [],
          };
        }

        const df = Array.isArray(m.daily_fans) ? m.daily_fans : [];
        const todayIdx = Math.min(today - 1, df.length - 1);
        let currentFans = 0;
        let latestIdx = -1;

        for (let i = todayIdx; i >= 0; i--) {
          if (df[i] > 0) {
            currentFans = df[i];
            latestIdx = i;
            break;
          }
        }

        let dailyGain = null;
        if (latestIdx >= 1) {
          for (let i = latestIdx - 1; i >= 0; i--) {
            if (df[i] > 0) {
              dailyGain = currentFans - df[i];
              break;
            }
          }
        }

        const firstNZ = df.find((v) => v > 0);
        const monthlyGain = firstNZ != null && currentFans > 0 ? currentFans - firstNZ : null;
        const daysWithData = df.slice(0, todayIdx + 1).filter((v) => v > 0).length;
        let projected = null;

        if (monthlyGain !== null && daysWithData > 0) {
          projected = Math.round((monthlyGain / Math.max(daysWithData, 1)) * dim);
        } else if (dailyGain !== null) {
          projected = Math.round(dailyGain * dim);
        }

        return {
          name: m.trainer_name || m.name || "Unknown",
          fans: currentFans,
          dailyGain,
          monthlyGain,
          projected,
          isActive: m.isActive !== false,
          dailyFans: df,
        };
      });

      const clubName = json?.circle?.name || json?.name || "Unknown";
      const lastFetch = json?.circle?.last_updated || json?.circle?.yesterday_updated || null;
      return { members, clubName, lastFetch };
    }

    function buildCumulativeSeries(dailyFans, dim) {
      const df = Array.isArray(dailyFans) ? dailyFans : [];
      const series = [];
      let baseline = null;
      let lastSeen = 0;

      for (let i = 0; i < dim; i++) {
        const raw = Number(df[i] ?? 0);

        if (baseline == null) {
          if (raw > 0) {
            baseline = raw;
            lastSeen = raw;
            series.push(0);
          } else {
            series.push(0);
          }
          continue;
        }

        if (raw > 0) {
          lastSeen = raw;
        }

        series.push(Math.max(0, lastSeen - baseline));
      }

      return series;
    }

    function getMonthWeeks(year, monthIndex) {
      const dim = daysInMonth(year, monthIndex + 1);
      const weeks = [];
      let day = 1;

      while (day <= dim) {
        const date = new Date(year, monthIndex, day);
        const weekday = (date.getDay() + 6) % 7;
        const endDay = Math.min(dim, day + (6 - weekday));
        weeks.push({
          index: weeks.length,
          number: weeks.length + 1,
          startDay: day,
          endDay,
          dayCount: endDay - day + 1,
        });
        day = endDay + 1;
      }

      return weeks;
    }

    function findWeekForDay(weeks, day) {
      return weeks.find((week) => day >= week.startDay && day <= week.endDay) || weeks[weeks.length - 1];
    }

    function getDateLabel(year, monthIndex, day) {
      return new Date(year, monthIndex, day).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function getWeekLabel(week, year, monthIndex) {
      if (!week) return "—";
      return `${getDateLabel(year, monthIndex, week.startDay)} – ${getDateLabel(year, monthIndex, week.endDay)}`;
    }

    function getPlanMetrics(monthlyGain, monthlyTarget, today, dim, weeks) {
      const safeGain = monthlyGain ?? 0;
      const dailyTarget = monthlyTarget > 0 ? monthlyTarget / dim : 0;
      const expectedToDate = Math.round(dailyTarget * today);
      const delta = safeGain - expectedToDate;
      const ratio = expectedToDate > 0 ? safeGain / expectedToDate : 1;

      let statusKey = "on-track";
      if (expectedToDate > 0 && ratio < 0.25) {
        statusKey = "critical";
      } else if (expectedToDate > 0 && ratio < 1) {
        statusKey = "behind";
      }

      const currentWeek = findWeekForDay(weeks, today);
      const currentWeekTarget = currentWeek ? Math.round(dailyTarget * currentWeek.dayCount) : 0;
      const currentWeekElapsedDays = currentWeek ? Math.max(0, today - currentWeek.startDay + 1) : 0;
      const currentWeekExpectedToDate = Math.round(dailyTarget * currentWeekElapsedDays);
      const currentWeekCheckpointTarget = currentWeek ? Math.round(dailyTarget * currentWeek.endDay) : expectedToDate;

      return {
        dailyTarget,
        expectedToDate,
        delta,
        ratio,
        statusKey,
        status: STATUS_META[statusKey].label,
        currentWeek,
        currentWeekTarget,
        currentWeekElapsedDays,
        currentWeekExpectedToDate,
        currentWeekCheckpointTarget,
      };
    }

    function deltaText(delta) {
      if (delta == null) return "—";
      if (delta === 0) return "On weekly plan";
      return `${fmtSigned(delta)} ${delta >= 0 ? "above" : "below"} weekly plan`;
    }

    function ProgressBar({ pct, color = "#7c3aed", height = 8 }) {
      return (
        <div style={{ background: "#1a1730", borderRadius: 99, height, overflow: "hidden", width: "100%" }}>
          <div
            style={{
              width: `${Math.min(100, Math.max(0, pct || 0))}%`,
              height: "100%",
              background: color,
              borderRadius: 99,
              transition: "width 0.5s ease",
            }}
          />
        </div>
      );
    }

    function TierBadge({ tier }) {
      const c = TIER_COLORS[tier] || TIER_COLORS["B+"];
      return (
        <span
          style={{
            background: c.bg,
            border: `1px solid ${c.border}`,
            color: c.text,
            borderRadius: 6,
            padding: "2px 8px",
            fontSize: 11,
            fontWeight: 800,
          }}
        >
          {tier}
        </span>
      );
    }

    function StatusBadge({ statusKey }) {
      const meta = STATUS_META[statusKey] || STATUS_META["behind"];
      return (
        <span
          style={{
            background: meta.bg,
            border: `1px solid ${meta.border}`,
            color: meta.color,
            borderRadius: 6,
            padding: "2px 8px",
            fontSize: 10,
            fontWeight: 800,
            whiteSpace: "nowrap",
          }}
        >
          {meta.label}
        </span>
      );
    }

    function Sparkline({ data = [], width = 90, height = 26 }) {
      const vals = data.filter((v) => v > 0);
      if (vals.length < 2) return <span style={{ color: "#4b5563", fontSize: 10 }}>—</span>;

      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min || 1;
      const step = width / (vals.length - 1);

      const pts = vals
        .map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`)
        .join(" ");

      const lx = (vals.length - 1) * step;
      const ly = height - ((vals[vals.length - 1] - min) / range) * (height - 4) - 2;

      return (
        <svg width={width} height={height}>
          <polyline points={pts} fill="none" stroke="#7c3aed" strokeWidth={1.5} strokeLinejoin="round" />
          <circle cx={lx} cy={ly} r={2.5} fill="#c4b5fd" />
        </svg>
      );
    }

    function PaceChart({ actualSeries = [], targetSeries = [], weeks = [], year, monthIndex }) {
      const [hoverIdx, setHoverIdx] = useState(null);

      if (!actualSeries.length || !targetSeries.length) {
        return (
          <div style={{ color: "#6b7280", fontSize: 12, padding: "18px 0" }}>
            Not enough daily data to render the pace chart yet.
          </div>
        );
      }

      const width = 980;
      const height = 320;
      const padding = { top: 24, right: 28, bottom: 42, left: 62 };
      const innerW = width - padding.left - padding.right;
      const innerH = height - padding.top - padding.bottom;
      const maxVal = Math.max(...actualSeries, ...targetSeries, 1);
      const dayCount = actualSeries.length;

      const xForIndex = (index) => padding.left + (dayCount <= 1 ? 0 : (index / (dayCount - 1)) * innerW);
      const yForValue = (value) => padding.top + innerH - ((value || 0) / maxVal) * innerH;

      const pathFor = (series) =>
        series
          .map((value, index) => `${index === 0 ? "M" : "L"} ${xForIndex(index)} ${yForValue(value)}`)
          .join(" ");

      const gridValues = Array.from({ length: 5 }, (_, i) => Math.round((maxVal / 4) * i));
      const hover = hoverIdx != null
        ? {
            day: hoverIdx + 1,
            actual: actualSeries[hoverIdx] ?? 0,
            target: targetSeries[hoverIdx] ?? 0,
            x: xForIndex(hoverIdx),
            yActual: yForValue(actualSeries[hoverIdx] ?? 0),
            yTarget: yForValue(targetSeries[hoverIdx] ?? 0),
          }
        : null;

      return (
        <div style={{ position: "relative" }}>
          <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", display: "block" }}>
            {gridValues.map((value, index) => {
              const y = yForValue(value);
              return (
                <g key={index}>
                  <line x1={padding.left} x2={width - padding.right} y1={y} y2={y} stroke="#1e1b35" strokeDasharray="4 4" />
                  <text x={padding.left - 10} y={y + 4} textAnchor="end" fill="#6b7280" fontSize="10">
                    {fmt(value)}
                  </text>
                </g>
              );
            })}

            {weeks.map((week) => {
              const x = xForIndex(week.endDay - 1);
              return (
                <g key={week.number}>
                  <line x1={x} x2={x} y1={padding.top} y2={height - padding.bottom} stroke="#2a2540" strokeDasharray="3 5" />
                  <text x={x - 4} y={padding.top + 12} textAnchor="end" fill="#6b7280" fontSize="10">
                    W{week.number}
                  </text>
                </g>
              );
            })}

            <path d={pathFor(targetSeries)} fill="none" stroke="#c4b5fd" strokeWidth="2" strokeDasharray="7 6" />
            <path d={pathFor(actualSeries)} fill="none" stroke="#34d399" strokeWidth="3" />

            {hover && (
              <>
                <line x1={hover.x} x2={hover.x} y1={padding.top} y2={height - padding.bottom} stroke="#7c3aed" strokeDasharray="2 4" />
                <circle cx={hover.x} cy={hover.yActual} r="5" fill="#34d399" />
                <circle cx={hover.x} cy={hover.yTarget} r="4" fill="#c4b5fd" />
              </>
            )}

            {Array.from({ length: dayCount }, (_, index) => {
              const startX = index === 0 ? padding.left : (xForIndex(index - 1) + xForIndex(index)) / 2;
              const endX = index === dayCount - 1 ? width - padding.right : (xForIndex(index) + xForIndex(index + 1)) / 2;

              return (
                <g key={index}>
                  <rect
                    x={startX}
                    y={padding.top}
                    width={Math.max(10, endX - startX)}
                    height={innerH}
                    fill="transparent"
                    onMouseEnter={() => setHoverIdx(index)}
                    onMouseLeave={() => setHoverIdx(null)}
                  />
                  {(index === 0 || index === dayCount - 1 || ((index + 1) % 5 === 0)) && (
                    <text
                      x={xForIndex(index)}
                      y={height - padding.bottom + 18}
                      textAnchor="middle"
                      fill="#6b7280"
                      fontSize="10"
                    >
                      {index + 1}
                    </text>
                  )}
                </g>
              );
            })}
          </svg>

          {hover && (
            <div
              style={{
                position: "absolute",
                left: `${(hover.x / width) * 100}%`,
                top: `${Math.max(8, (Math.min(hover.yActual, hover.yTarget) / height) * 100 - 3)}%`,
                transform: "translate(-50%, -100%)",
                background: "#111028",
                border: "1px solid #2a2540",
                borderRadius: 10,
                padding: "10px 12px",
                minWidth: 190,
                boxShadow: "0 16px 40px rgba(0,0,0,0.35)",
                pointerEvents: "none",
              }}
            >
              <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 12, marginBottom: 5 }}>
                {getDateLabel(year, monthIndex, hover.day)}
              </div>
              <div style={{ color: "#34d399", fontSize: 12, marginBottom: 3 }}>Actual: {fmt(hover.actual)}</div>
              <div style={{ color: "#c4b5fd", fontSize: 12, marginBottom: 3 }}>Target: {fmt(hover.target)}</div>
              <div style={{ color: gainColor(hover.actual - hover.target), fontSize: 12, fontWeight: 700 }}>
                {deltaText(hover.actual - hover.target)}
              </div>
            </div>
          )}

          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 10, color: "#9ca3af", fontSize: 11 }}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 14, height: 3, background: "#34d399", borderRadius: 99, display: "inline-block" }} />
              Actual club cumulative gain
            </span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 14, height: 3, background: "#c4b5fd", borderRadius: 99, display: "inline-block" }} />
              Target pace
            </span>
          </div>
        </div>
      );
    }

    function CircleTracker() {
      const now = new Date();
      const year = now.getFullYear();
      const monthIndex = now.getMonth();
      const today = now.getDate();
      const dim = daysInMonth(year, monthIndex + 1);
      const daysLeft = dim - today;
      const monthWeeks = getMonthWeeks(year, monthIndex);

      const [view, setView] = useState("home");
      const [activeIdx, setActiveIdx] = useState(0);
      const [clubData, setClubData] = useState({});
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [tab, setTab] = useState("dashboard");
      const [copied, setCopied] = useState(false);
      const [debugLog, setDebugLog] = useState([]);
      const [memberSort, setMemberSort] = useState({ key: "monthlyGain", direction: "desc" });
      const [memberFilters, setMemberFilters] = useState({ name: "", status: "" });

      const club = CLUBS[activeIdx];
      const cid = club.id;
      const data = cid ? (clubData[cid] || null) : null;
      const allMembers = data?.members || [];
      const activeMembers = allMembers.filter((m) => m.isActive !== false);
      const tc = TIER_COLORS[club.tier] || TIER_COLORS["B+"];
      const clubName = data?.clubName || club.name;
      const lastFetch = data?.lastFetch || null;

      async function fetchData(idOverride = null, silent = false) {
        const targetId = idOverride || cid;
        if (!targetId) return;

        if (!silent) {
          setLoading(true);
          setErr("");
        }

        const log = [];
        const candidates = [`./data/${targetId}.json`, `/data/${targetId}.json`];

        for (const url of candidates) {
          try {
            const res = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
            log.push(`${res.ok ? "✓" : "✗"} ${url} → ${res.status}`);

            if (!res.ok) continue;

            const text = await res.text();
            const result = parseJSON(text);

            if (result.error) {
              log.push("  ↳ " + result.error);
              continue;
            }

            setClubData((prev) => ({
              ...prev,
              [targetId]: {
                members: result.members,
                clubName: result.clubName,
                lastFetch: result.lastFetch || new Date().toISOString(),
              },
            }));

            setDebugLog(log);
            if (!silent) setLoading(false);
            return;
          } catch (e) {
            log.push(`✗ ${url} → ${e.message}`);
          }
        }

        setDebugLog(log);
        if (!silent) {
          setErr(`Failed to load repo JSON for ${targetId}. Make sure data/${targetId}.json exists.`);
          setLoading(false);
        }
      }

      async function loadAllData() {
        setLoading(true);
        setErr("");
        const allLogs = [];
        const next = {};

        for (const c of CLUBS) {
          if (!c.id) continue;
          const candidates = [`./data/${c.id}.json`, `/data/${c.id}.json`];
          let loaded = false;

          for (const url of candidates) {
            try {
              const res = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
              allLogs.push(`${res.ok ? "✓" : "✗"} ${url} → ${res.status}`);

              if (!res.ok) continue;

              const text = await res.text();
              const result = parseJSON(text);

              if (result.error) {
                allLogs.push(`  ↳ ${c.id}: ${result.error}`);
                continue;
              }

              next[c.id] = {
                members: result.members,
                clubName: result.clubName,
                lastFetch: result.lastFetch || new Date().toISOString(),
              };
              loaded = true;
              break;
            } catch (e) {
              allLogs.push(`✗ ${url} → ${e.message}`);
            }
          }

          if (!loaded) {
            allLogs.push(`⚠ ${c.id} not loaded`);
          }
        }

        setClubData(next);
        setDebugLog(allLogs);
        setLoading(false);
      }

      useEffect(() => {
        loadAllData();
      }, []);

      useEffect(() => {
        if (cid && !clubData[cid]) {
          fetchData(cid, true);
        }
      }, [activeIdx]);

      function decorateMember(member, monthlyTarget) {
        return {
          ...member,
          plan: getPlanMetrics(member.monthlyGain ?? 0, monthlyTarget, today, dim, monthWeeks),
        };
      }

      const decoratedMembers = activeMembers.map((member) => decorateMember(member, club.target));

          return sum + (memberSeries[idx] ?? 0);

          totalMonthly: decorated.reduce((sum, member) => sum + (member.monthlyGain ?? 0), 0),

          totalExpected: Math.round((decorated.length * entry.target / Math.max(dim, 1)) * today),
          hasData: Boolean(cdata),

          if (monthDiff !== 0) return monthDiff;
          const projectedDiff = (b.projected ?? Number.NEGATIVE_INFINITY) - (a.projected ?? Number.NEGATIVE_INFINITY);

      function buildDiscord() {
        const bar = (p, len = 18) => {
          const filled = Math.round((Math.min(p, 100) / 100) * len);
          return "█".repeat(filled) + "░".repeat(len - filled);
        };
        const P = (s, n) => String(s).padStart(n);
        const PL = (s, n) => String(s).padEnd(n);
        const ds = now.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

        let msg = `📊 **[${club.tier}] ${club.name} — Circle Report** | ${ds}\n`;

        msg += `🎯 **Per-Member Target:** ${fmt(club.target)}/month\n`;
        msg += `👥 **Active Members:** ${decoratedMembers.length}/${MAX_MEMBERS}  |  📅 Day ${today}/${dim} · ${daysLeft} days left\n`;
        msg += `✅ On weekly plan: **${membersOnTrack}/${decoratedMembers.length || 0}** members\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += "```\n";
        msg += `${PL("MEMBER",20)}${P("FANS",12)}${P("+TODAY",10)}${P("+MONTH",11)}${P("PROJ",10)}${P("ST",4)}\n`;
        msg += "─".repeat(67) + "\n";

        [...decoratedMembers]
          .sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0))
          .forEach((member) => {
            const statusShort = member.plan.statusKey === "on-track" ? "✅" : member.plan.statusKey === "critical" ? "🟥" : "⚠️";
            msg += `${PL(member.name.slice(0, 19), 20)}${P(fmt(member.fans), 12)}${P(fmtSigned(member.dailyGain ?? 0), 10)}${P(fmtSigned(member.monthlyGain ?? 0), 11)}${P(member.projected != null ? fmt(member.projected) : "—", 10)}${P(statusShort, 4)}\n`;
          });

        msg += "─".repeat(67) + "\n";
        msg += `${PL("TOTAL",20)}${P(fmt(totalFans),12)}${P(fmtSigned(totalDaily),10)}${P(fmtSigned(totalMonthly),11)}${P(fmt(totalProj),10)}\n`;
        msg += "```\n";

        [...decoratedMembers]
          .sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0))
          .forEach((member) => {
            const pct = club.target > 0 ? Math.min(100, ((member.monthlyGain ?? 0) / club.target) * 100) : 0;
            msg += `**${member.name}** \`${bar(pct)}\` ${pct.toFixed(1)}% of target · ${deltaText(member.plan.delta)}\n`;
          });

        msg += `> 🤖 *Dominator Network Tracker · ${club.officer}*`;
        return msg;

            return { key, direction: "desc" };

          if (prev.direction === "desc") {
            return { key, direction: "asc" };

          return { key: null, direction: "off" };

              return ((av > bv) ? 1 : -1) * dir;

                        {[
                          { label: "Active Members", value: `${decoratedMembers.length}/${MAX_MEMBERS}`, sub: "Inactive excluded", col: "#e2e0f0" },
                          { label: "On Track", value: statusCounts["on-track"], sub: "At or above weekly pace", col: "#34d399" },
                          { label: "Behind", value: statusCounts["behind"], sub: "Below pace but above 25%", col: "#fbbf24" },
                          { label: "Critical", value: statusCounts["critical"], sub: "Under 25% of weekly pace", col: "#f87171" },
                          { label: "Club Monthly +", value: fmt(totalMonthly), sub: "All active members", col: gainColor(totalMonthly) },
                          { label: "Club Vs Weekly Plan", value: fmtSigned(clubWeeklyDelta), sub: `Target by today: ${fmt(clubExpectedToDate)}`, col: gainColor(clubWeeklyDelta) },
                        ].map((card) => (
                          <div key={card.label} style={{ background: "#111028", border: "1px solid #1e1b35", borderRadius: 12, padding: "11px 14px" }}>
                            <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 3 }}>{card.label}</div>
                            <div style={{ color: card.col, fontSize: 18, fontWeight: 700 }}>{card.value}</div>
                            <div style={{ color: "#4b5563", fontSize: 10, marginTop: 2 }}>{card.sub}</div>
                          </div>
                        ))}
                      </div>

                      <div style={S.card}>
                        <div style={S.h2}>Member Progress — Sorted by Monthly Gain</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {sortedByMonthly.map((member, index) => {
                            const monthPct = club.target > 0 ? Math.min(100, ((member.monthlyGain ?? 0) / club.target) * 100) : 0;
                            const stillNeed = Math.max(0, club.target - (member.monthlyGain ?? 0));
                            const progressColor = monthPct >= 100 ? "#34d399" : tc.bar;

                            return (
                              <div key={`${member.name}-${index}`} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 10, padding: "12px 14px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7, flexWrap: "wrap", gap: 4 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ color: "#4b5563", fontSize: 11, fontWeight: 700, minWidth: 20 }}>#{index + 1}</span>
                                    <span style={{ fontWeight: 700, color: "#e2e0f0", fontSize: 13 }}>{member.name}</span>
                                    <StatusBadge statusKey={member.plan.statusKey} />
                                  </div>

                                  <div style={{ display: "flex", gap: 14, fontSize: 11, flexWrap: "wrap" }}>
                                    <span style={{ color: "#6b7280" }}>Today: <b style={{ color: gainColor(member.dailyGain) }}>{member.dailyGain != null ? fmtSigned(member.dailyGain) : "—"}</b></span>
                                    <span style={{ color: "#6b7280" }}>Month: <b style={{ color: gainColor(member.monthlyGain) }}>{member.monthlyGain != null ? fmtSigned(member.monthlyGain) : "—"}</b></span>
                                    <span style={{ color: "#6b7280" }}>Projected: <b style={{ color: "#c4b5fd" }}>{member.projected != null ? fmt(member.projected) : "—"}</b></span>
                                  </div>
                                </div>

                                <div style={{ marginBottom: 8 }}>
                                  <ProgressBar pct={monthPct} color={progressColor} height={9} />
                                </div>

                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10, alignItems: "center" }}>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Current Fans</div>
                                    <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 14 }}>{fmtFull(member.fans)}</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Target Progress</div>
                                    <div style={{ color: progressColor, fontWeight: 700, fontSize: 14 }}>{monthPct.toFixed(1)}%</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Still Needed</div>
                                    <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 14 }}>{fmt(stillNeed)}</div>
                                  </div>
                                  <div>
                                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Vs Weekly Plan</div>
                                    <div style={{ color: gainColor(member.plan.delta), fontWeight: 700, fontSize: 14 }}>{deltaText(member.plan.delta)}</div>
                                  </div>
                                  <div style={{ justifySelf: "end" }}>
                                    <Sparkline data={member.dailyFans || []} />
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </>
                  )}

                  {tab === "members" && (
                    <div style={S.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                        <div>
                          <div style={S.h2}>Members</div>
                          <div style={{ color: "#6b7280", fontSize: 12 }}>
                            Name and Status use dropdown filters. Fans, Today, Month, and Projected cycle through Desc, Asc, and Off sorting.
                          </div>
                        </div>
                        <button style={S.btn(false)} onClick={clearMemberFilters}>Clear filters</button>
                      </div>

                      <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse" }}>
                          <thead>
                            <tr style={{ textAlign: "left" }}>
                              {[
                                { key: "rank", label: "#", sortable: false },
                                { key: "name", label: "Name", sortable: false },
                                { key: "fans", label: "Fans", sortable: true },
                                { key: "dailyGain", label: "Today", sortable: true },
                                { key: "monthlyGain", label: "Month", sortable: true },
                                { key: "projected", label: "Projected", sortable: true },
                                { key: "weeklyDelta", label: "Vs Weekly Plan", sortable: false },
                                { key: "status", label: "Status", sortable: false },
                              ].map((col) => (
                                <th key={col.key} style={S.th}>
                                  {col.sortable ? (
                                    <button
                                      style={{ background: "transparent", border: "none", color: "inherit", font: "inherit", cursor: "pointer", padding: 0, display: "inline-flex", gap: 6, alignItems: "center" }}
                                      onClick={() => handleSort(col.key)}
                                    >
                                      <span>{col.label}</span>
                                      <span style={{ color: memberSort.key === col.key ? tc.text : "#4b5563", fontSize: 10 }}>{sortIndicator(col.key)}</span>
                                    </button>
                                  ) : (
                                    <span>{col.label}</span>
                                  )}
                                </th>
                              ))}
                            </tr>
                            <tr>
                              <th style={S.th}></th>
                              <th style={S.th}>
                                <select style={S.input} value={memberFilters.name} onChange={(e) => updateMemberFilter("name", e.target.value)}>
                                  <option value="">All Members</option>
                                  {memberNameOptions.map((name) => (
                                    <option key={name} value={name}>{name}</option>
                                  ))}
                                </select>
                              </th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}></th>
                              <th style={S.th}>
                                <select style={S.input} value={memberFilters.status} onChange={(e) => updateMemberFilter("status", e.target.value)}>
                                  <option value="">All Statuses</option>
                                  <option value="on-track">On Track</option>
                                  <option value="behind">Behind</option>
                                  <option value="critical">Critical</option>
                                </select>
                              </th>
                            </tr>
                          </thead>
                          <tbody>
                            {memberRows.length === 0 ? (
                              <tr>
                                <td colSpan={8} style={{ ...S.td, color: "#6b7280", textAlign: "center", padding: "22px 8px" }}>
                                  No members match the current filters.
                                </td>
                              </tr>
                            ) : (
                              memberRows.map(({ member, rank }) => (
                                <tr key={`${member.name}-${rank}`}>
                                  <td style={{ ...S.td, color: "#6b7280" }}>{rank}</td>
                                  <td style={{ ...S.td, color: "#e2e0f0", fontWeight: 700 }}>{member.name}</td>
                                  <td style={S.td}>{fmtFull(member.fans)}</td>
                                  <td style={{ ...S.td, color: gainColor(member.dailyGain) }}>
                                    {member.dailyGain != null ? fmtSigned(member.dailyGain) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: gainColor(member.monthlyGain) }}>
                                    {member.monthlyGain != null ? fmtSigned(member.monthlyGain) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: "#c4b5fd" }}>
                                    {member.projected != null ? fmt(member.projected) : "—"}
                                  </td>
                                  <td style={{ ...S.td, color: gainColor(member.plan.delta), fontWeight: 700 }}>
                                    {deltaText(member.plan.delta)}
                                  </td>
                                  <td style={S.td}>
                                    <StatusBadge statusKey={member.plan.statusKey} />
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {tab === "pace" && (
                    <div style={S.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
                        <div>
                          <div style={S.h2}>Club Pace</div>
                          <div style={{ color: "#6b7280", fontSize: 12 }}>
                            Monday–Sunday calendar weeks. Inactive members are fully excluded from targets and actual totals.
                          </div>
                        </div>
                        <div style={{ color: "#9ca3af", fontSize: 12 }}>
                          {getWeekLabel(currentWeek, year, monthIndex)}
                        </div>
                      </div>

                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10, marginBottom: 14 }}>
                        {[
                          { label: "Current Week", value: `Week ${currentWeek?.number || 1}`, sub: getWeekLabel(currentWeek, year, monthIndex), col: "#e2e0f0" },
                          { label: "Club Target by Today", value: fmt(clubExpectedToDate), sub: `${decoratedMembers.length} active × ${fmt(club.target)}`, col: "#c4b5fd" },
                          { label: "Actual by Today", value: fmt(totalMonthly), sub: "Cumulative monthly gain", col: "#34d399" },
                          { label: "Vs Pace", value: fmtSigned(clubWeeklyDelta), sub: deltaText(clubWeeklyDelta), col: gainColor(clubWeeklyDelta) },
                        ].map((card) => (
                          <div key={card.label} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 12, padding: "11px 14px" }}>
                            <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 3 }}>{card.label}</div>
                            <div style={{ color: card.col, fontSize: 18, fontWeight: 700 }}>{card.value}</div>
                            <div style={{ color: "#4b5563", fontSize: 10, marginTop: 2 }}>{card.sub}</div>
                          </div>
                        ))}
                      </div>

                      <PaceChart actualSeries={clubActualSeries} targetSeries={clubTargetSeries} weeks={monthWeeks} year={year} monthIndex={monthIndex} />

                      <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 10 }}>
                        {monthWeeks.map((week) => {
                          const checkpointTarget = Math.round((clubMonthlyTarget / Math.max(dim, 1)) * week.endDay);
                          const checkpointActual = clubActualSeries[week.endDay - 1] ?? 0;
                          const delta = checkpointActual - checkpointTarget;

                          return (
                            <div key={week.number} style={{ background: "#0f0d1a", border: "1px solid #1e1b35", borderRadius: 12, padding: "12px 13px" }}>
                              <div style={{ color: "#e2e0f0", fontWeight: 700, fontSize: 13, marginBottom: 4 }}>Week {week.number}</div>
                              <div style={{ color: "#6b7280", fontSize: 11, marginBottom: 8 }}>{getWeekLabel(week, year, monthIndex)}</div>
                              <div style={{ color: "#6b7280", fontSize: 11 }}>Checkpoint target: <b style={{ color: "#c4b5fd" }}>{fmt(checkpointTarget)}</b></div>
                              <div style={{ color: "#6b7280", fontSize: 11 }}>Actual at end: <b style={{ color: "#34d399" }}>{fmt(checkpointActual)}</b></div>
                              <div style={{ color: gainColor(delta), fontSize: 11, fontWeight: 700, marginTop: 5 }}>{deltaText(delta)}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {tab === "debug" && (
                    <div style={S.card}>
                      <div style={S.h2}>Debug</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                        <button style={S.btn(false)} onClick={() => fetchData()}>Reload current club</button>
                        <button style={S.btn(false)} onClick={() => loadAllData()}>Reload all clubs</button>
                        <button style={S.btn(false)} onClick={() => setDebugLog([])}>Clear log</button>
                      </div>

                      <div style={{ color: "#9ca3af", fontSize: 12, marginBottom: 12, lineHeight: 1.7 }}>
                        This page reads JSON from your deployed repo files. Expected path for this club: <b style={{ color: "#e2e0f0" }}>data/{cid}.json</b>
                      </div>

                      <pre
                        style={{
                          whiteSpace: "pre-wrap",
                          wordBreak: "break-word",
                          background: "#0a0912",
                          border: "1px solid #1e1b35",
                          borderRadius: 10,
                          padding: 12,
                          color: "#c4b5fd",
                          fontSize: 12,
                          lineHeight: 1.55,
                        }}
                      >
{debugLog.length ? debugLog.join("\n") : "No debug entries yet."}
                      </pre>
                    </div>
                  )}
                </>
              )}
            </>
          )}
        </div>
      );
    }

    if (window.__ALLOW_APP__) {
      ReactDOM.createRoot(document.getElementById("root")).render(<CircleTracker />);
    }
  </script>

</body>
</html>
