<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dominator Network — Circle Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0912; overflow-y: scroll; }
    textarea:focus, button:focus-visible { outline: 2px solid #7c3aed; outline-offset: 2px; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0912; }
    ::-webkit-scrollbar-thumb { background: #1e1b35; border-radius: 3px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// ── Club Registry ──────────────────────────────────────────────────────────
const CLUBS = [
  { tier: "S",  name: "Dominator",  officer: "@mikufans.",     id: "114037107", target: 75_000_000 },
  { tier: "S",  name: "Dominant H",   officer: "@.stayk",        id: "278155676", target: 75_000_000 },
  { tier: "S",  name: "Dominance",  officer: "@mikufans.",     id: "754870359", target: 75_000_000 },
  { tier: "A+", name: "Dominate",   officer: "@reyovalt",      id: "147185239", target: 50_000_000 },
  { tier: "A+", name: "Domineer",   officer: "@patuazul",      id: "961801794", target: 50_000_000 },
  { tier: "A+", name: "Dominium",   officer: "@jkpokes",       id: "449007774", target: 50_000_000 },
  { tier: "A",  name: "Dominion",   officer: "@virsia",        id: "510137721", target: 30_000_000 },
  { tier: "A",  name: "Domical",    officer: "@mikufans.",     id: null,         target: 30_000_000 },
  { tier: "B+", name: "Domicile",   officer: "@goofyahhclown", id: "387070372", target: 20_000_000 },
  { tier: "B+", name: "Domichill",  officer: "@mikufans.",     id: null,         target: 20_000_000 },
];

const MAX_MEMBERS = 30;
const TIER_COLORS = {
  "S":  { bg: "#fbbf2422", border: "#fbbf24", text: "#fbbf24", bar: "#f59e0b" },
  "A+": { bg: "#a78bfa22", border: "#a78bfa", text: "#a78bfa", bar: "#7c3aed" },
  "A":  { bg: "#34d39922", border: "#34d399", text: "#34d399", bar: "#059669" },
  "B+": { bg: "#60a5fa22", border: "#60a5fa", text: "#60a5fa", bar: "#2563eb" },
};

const DATA_PATH = "/data";
const STATIC_JSON_PATHS = (clubId) => [`${DATA_PATH}/${clubId}.json`, `${DATA_PATH}/circle_${clubId}_stats.json`, `${DATA_PATH}/circle_${clubId}_${new Date().getFullYear()}_${new Date().getMonth() + 1}_stats.json`];

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = (n) => {
  if (n == null) return "—";
  const abs = Math.abs(n), sign = n < 0 ? "-" : "";
  if (abs >= 1_000_000_000) return sign + (abs / 1_000_000_000).toFixed(2) + "B";
  if (abs >= 1_000_000)     return sign + (abs / 1_000_000).toFixed(2) + "M";
  if (abs >= 1_000)         return sign + (abs / 1_000).toFixed(1) + "K";
  return n.toLocaleString();
};
const fmtFull = (n) => (n == null ? "—" : Number(n).toLocaleString());
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const gainColor = (n) => n == null ? "#6b7280" : n > 0 ? "#34d399" : n < 0 ? "#f87171" : "#9ca3af";

// ── Parser — handles the uma.moe export format ─────────────────────────────
// Supports BOTH formats:
//   • Export format: members have fan_count, daily_gain, monthly_gain, projected_monthly
//   • Raw API format: members have daily_fans array
function parseJSON(raw) {
  let json;
  try {
    json = typeof raw === "string" ? JSON.parse(raw.trim()) : raw;
  } catch (e) {
    return { error: "Invalid JSON: " + e.message };
  }

  const membersArr = Array.isArray(json)
    ? json
    : Array.isArray(json.members)
    ? json.members
    : Array.isArray(json.data?.members)
    ? json.data.members
    : null;

  if (!membersArr || membersArr.length === 0)
    return { error: "No members array found. Keys in JSON: " + Object.keys(json).join(", ") };

  const now   = new Date();
  const today = now.getDate();
  const dim   = daysInMonth(now.getFullYear(), now.getMonth() + 1);

  const members = membersArr.map((m) => {
    // ── Export format (has fan_count + pre-computed fields) ──────────────
    if (m.fan_count != null) {
      return {
        name:        m.name || m.trainer_name || "Unknown",
        fans:        m.fan_count,
        dailyGain:   m.daily_gain   ?? null,
        monthlyGain: m.monthly_gain ?? null,
        projected:   m.projected_monthly ?? null,
        isActive:    m.isActive !== false,
        dailyFans:   Array.isArray(m.daily_fans) ? m.daily_fans : [],
      };
    }

    // ── Raw API format (has daily_fans array only) ───────────────────────
    const df = Array.isArray(m.daily_fans) ? m.daily_fans : [];
    const todayIdx = Math.min(today - 1, df.length - 1);
    let currentFans = 0, latestIdx = -1;
    for (let i = todayIdx; i >= 0; i--) {
      if (df[i] > 0) { currentFans = df[i]; latestIdx = i; break; }
    }
    let dailyGain = null;
    if (latestIdx >= 1) {
      for (let i = latestIdx - 1; i >= 0; i--) {
        if (df[i] > 0) { dailyGain = currentFans - df[i]; break; }
      }
    }
    const firstNZ = df.find(v => v > 0);
    const monthlyGain = firstNZ != null && currentFans > 0 ? currentFans - firstNZ : null;
    const daysWithData = df.slice(0, todayIdx + 1).filter(v => v > 0).length;
    let projected = null;
    if (monthlyGain !== null && daysWithData > 0)
      projected = Math.round((monthlyGain / Math.max(daysWithData, 1)) * dim);
    else if (dailyGain !== null)
      projected = Math.round(dailyGain * dim);
    return {
      name: m.trainer_name || m.name || "Unknown",
      fans: currentFans, dailyGain, monthlyGain, projected,
      isActive: true, dailyFans: df,
    };
  });

  const clubName = json?.circle?.name || json?.name || "Unknown";
  return { members, clubName };
}

// ── UI Components ──────────────────────────────────────────────────────────
function ProgressBar({ pct, color = "#7c3aed", height = 8 }) {
  return (
    <div style={{ background: "#1a1730", borderRadius: 99, height, overflow: "hidden", width: "100%" }}>
      <div style={{ width: `${Math.min(100, Math.max(0, pct || 0))}%`, height: "100%", background: color, borderRadius: 99, transition: "width 0.5s ease" }} />
    </div>
  );
}

function TierBadge({ tier }) {
  const c = TIER_COLORS[tier] || TIER_COLORS["B+"];
  return (
    <span style={{ background: c.bg, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 800 }}>
      {tier}
    </span>
  );
}

function Sparkline({ data = [], width = 90, height = 26 }) {
  const vals = data.filter(v => v > 0);
  if (vals.length < 2) return <span style={{ color: "#4b5563", fontSize: 10 }}>—</span>;
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const step = width / (vals.length - 1);
  const pts = vals.map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`).join(" ");
  const lx = (vals.length - 1) * step;
  const ly = height - ((vals[vals.length - 1] - min) / range) * (height - 4) - 2;
  return (
    <svg width={width} height={height}>
      <polyline points={pts} fill="none" stroke="#7c3aed" strokeWidth={1.5} strokeLinejoin="round" />
      <circle cx={lx} cy={ly} r={2.5} fill="#c4b5fd" />
    </svg>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────
function CircleTracker() {
  const now      = new Date();
  const today    = now.getDate();
  const dim      = daysInMonth(now.getFullYear(), now.getMonth() + 1);
  const daysLeft = dim - today;

  const [activeIdx,  setActiveIdx]  = useState(0); // default: Dominator
  const [clubData,   setClubData]   = useState({});
  const [loading,    setLoading]    = useState(false);
  const [err,        setErr]        = useState("");
  const [showPaste,  setShowPaste]  = useState(false);
  const [pasteText,  setPasteText]  = useState("");
  const [tab,        setTab]        = useState("dashboard");
  const [copied,     setCopied]     = useState(false);
  const [debugLog,   setDebugLog]   = useState([]);
  const [showInactive, setShowInactive] = useState(false);

  const club    = CLUBS[activeIdx];
  const cid     = club.id;
  const data    = cid ? (clubData[cid] || null) : null;
  const allMembers = data?.members || [];
  const members    = showInactive ? allMembers : allMembers.filter(m => m.isActive !== false);
  const tc      = TIER_COLORS[club.tier] || TIER_COLORS["B+"];

  useEffect(() => {
    let cancelled = false;

    async function loadAllClubData() {
      const logs = [];
      const entries = await Promise.all(
        CLUBS.filter(c => c.id).map(async (clubItem) => {
          const paths = STATIC_JSON_PATHS(clubItem.id);

          for (const path of paths) {
            try {
              const res = await fetch(path, {
                cache: "no-store",
                headers: { Accept: "application/json" },
              });

              logs.push(`${res.ok ? "✓" : "✗"} ${path} → ${res.status}`);
              if (!res.ok) continue;

              const json = await res.json();
              const result = parseJSON(json);
              if (result.error) {
                logs.push(`  ↳ ${clubItem.id}: ${result.error}`);
                continue;
              }

              return [
                clubItem.id,
                {
                  members: result.members,
                  clubName: result.clubName,
                  lastFetch: json?.circle?.last_updated || new Date().toISOString(),
                  sourcePath: path,
                },
              ];
            } catch (e) {
              logs.push(`✗ ${path} → ${e.message}`);
            }
          }

          logs.push(`• No deployed JSON found for ${clubItem.name} (${clubItem.id})`);
          return null;
        })
      );

      if (cancelled) return;

      const loaded = Object.fromEntries(entries.filter(Boolean));
      setClubData(loaded);
      setDebugLog(logs);
    }

    loadAllClubData();
    return () => {
      cancelled = true;
    };
  }, []);

  async function fetchData() {
    if (!cid) return;
    setLoading(true);
    setErr("");

    const log = [];
    for (const path of STATIC_JSON_PATHS(cid)) {
      try {
        const res = await fetch(path, {
          cache: "no-store",
          headers: { Accept: "application/json" },
        });
        log.push(`${res.ok ? "✓" : "✗"} ${path} → ${res.status}`);

        if (!res.ok) continue;

        const json = await res.json();
        const result = parseJSON(json);
        if (result.error) {
          log.push(`  ↳ ${result.error}`);
          continue;
        }

        setClubData((prev) => ({
          ...prev,
          [cid]: {
            members: result.members,
            clubName: result.clubName,
            lastFetch: json?.circle?.last_updated || new Date().toISOString(),
            sourcePath: path,
          },
        }));
        setDebugLog(log);
        setLoading(false);
        return;
      } catch (e) {
        log.push(`✗ ${path} → ${e.message}`);
      }
    }

    setDebugLog(log);
    setErr(`No deployed JSON file found for ${club.name}. Upload /public/data/${cid}.json on Netlify.`);
    setShowPaste(true);
    setLoading(false);
  }

  function handlePaste() {
    setErr("");
    if (!pasteText.trim()) {
      setErr("Nothing pasted yet.");
      return;
    }
    const result = parseJSON(pasteText);
    if (result.error) {
      setErr(result.error);
      return;
    }
    setClubData((prev) => ({
      ...prev,
      [cid]: {
        members: result.members,
        clubName: result.clubName,
        lastFetch: new Date().toISOString(),
        sourcePath: "manual paste (this browser only)",
      },
    }));
    setShowPaste(false);
    setPasteText("");
  }

  // ── Aggregates (active members only for metrics) ───────────────────────
  const activeMembers  = allMembers.filter(m => m.isActive !== false);
  const inactiveMembers = allMembers.filter(m => m.isActive === false);
  const sorted         = [...members].sort((a, b) => (b.monthlyGain ?? 0) - (a.monthlyGain ?? 0));
  const totalFans      = activeMembers.reduce((s, m) => s + (m.fans || 0), 0);
  const totalDaily     = activeMembers.reduce((s, m) => s + (m.dailyGain ?? 0), 0);
  const totalMonthly   = activeMembers.reduce((s, m) => s + (m.monthlyGain ?? 0), 0);
  const totalProj      = activeMembers.reduce((s, m) => s + (m.projected ?? 0), 0);
  const membersOnTrack = activeMembers.filter(m => (m.projected ?? 0) >= club.target).length;
  const lastFetch      = data?.lastFetch || null;

  // ── Discord Message ────────────────────────────────────────────────────
  function buildDiscord() {
    const bar = (p, len = 18) => { const f = Math.round(Math.min(p,100)/100*len); return "█".repeat(f)+"░".repeat(len-f); };
    const P  = (s, n) => String(s).padStart(n);
    const PL = (s, n) => String(s).padEnd(n);
    const dg = (n) => n != null ? ((n >= 0 ? "+" : "") + fmt(n)) : "—";
    const ds = now.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

    let msg = `📊 **[${club.tier}] ${club.name} — Circle Report** | ${ds}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `🎯 **Per-Member Target:** ${fmt(club.target)}/month\n`;
    msg += `👥 **Active Members:** ${activeMembers.length}/${MAX_MEMBERS}  |  📅 Day ${today}/${dim} · ${daysLeft} days left\n`;
    msg += `✅ On track: **${membersOnTrack}/${activeMembers.length}** members\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    msg += "```\n";
    msg += `${PL("MEMBER",20)}${P("FANS",12)}${P("+TODAY",10)}${P("+MONTH",11)}${P("PROJ",10)}${P("ST",4)}\n`;
    msg += "─".repeat(67)+"\n";
    [...activeMembers].sort((a,b)=>(b.monthlyGain??0)-(a.monthlyGain??0)).forEach(m => {
      const ok = (m.projected ?? 0) >= club.target;
      msg += `${PL(m.name.slice(0,19),20)}${P(fmt(m.fans),12)}${P(dg(m.dailyGain),10)}${P(dg(m.monthlyGain),11)}${P(m.projected!=null?fmt(m.projected):"—",10)}${P(ok?"✅":"⚠️",4)}\n`;
    });
    msg += "─".repeat(67)+"\n";
    msg += `${PL("TOTAL",20)}${P(fmt(totalFans),12)}${P(dg(totalDaily),10)}${P(dg(totalMonthly),11)}${P(fmt(totalProj),10)}\n`;
    msg += "```\n";
    [...activeMembers].sort((a,b)=>(b.monthlyGain??0)-(a.monthlyGain??0)).forEach(m => {
      const p = club.target > 0 ? Math.min(100, ((m.monthlyGain??0) / club.target) * 100) : 0;
      msg += `**${m.name}** \`${bar(p)}\` ${p.toFixed(1)}% of target\n`;
    });
    msg += `> 🤖 *Dominator Network Tracker · ${club.officer}*`;
    return msg;
  }

  async function copyDiscord() {
    await navigator.clipboard.writeText(buildDiscord());
    setCopied(true); setTimeout(() => setCopied(false), 2200);
  }

  // ── Styles ────────────────────────────────────────────────────────────
  const S = {
    root: { background: "#0a0912", minHeight: "100vh", color: "#e2e0f0", fontFamily: "'Inter',system-ui,sans-serif", padding: "16px" },
    card: { background: "#111028", border: "1px solid #1e1b35", borderRadius: 14, padding: "16px 18px", marginBottom: 14 },
    h2:   { fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.12em", margin: "0 0 14px" },
    btn:  (active, col = "#7c3aed") => ({
      background: active ? col : "#13112a", color: active ? "#fff" : "#6b7280",
      border: `1px solid ${active ? col : "#1e1b35"}`, borderRadius: 8,
      padding: "7px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600, transition: "all 0.15s",
    }),
  };

  return (
    <div style={S.root}>

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={{ fontSize:18, fontWeight:800, color:"#e2e0f0", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:tc.text }}>⬡</span> Dominator Network
            <span style={{ color:"#4b5563", fontSize:13, fontWeight:400 }}>Officer Tracker</span>
          </div>
          <div style={{ color:"#4b5563", fontSize:11, marginTop:2 }}>
            {now.toLocaleString("en-US",{month:"long",day:"numeric",year:"numeric"})} · Day {today}/{dim} · {daysLeft} days left
          </div>
        </div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          <button style={S.btn(false)} onClick={fetchData} disabled={loading||!cid}>{loading?"⟳ Loading…":"⟳ Reload JSON"}</button>
          <button style={S.btn(false,"#1d4ed8")} onClick={()=>{setShowPaste(true);setErr("");}} disabled={!cid}>📋 Paste</button>
          <button style={S.btn(true,copied?"#059669":tc.bar)} onClick={copyDiscord} disabled={!activeMembers.length}>{copied?"✓ Copied!":"💬 Discord"}</button>
        </div>
      </div>

      {/* Club Selector */}
      <div style={{ ...S.card, padding:"12px 14px" }}>
        <div style={S.h2}>Select Club</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {CLUBS.map((c, i) => {
            const ctc = TIER_COLORS[c.tier];
            const active = i === activeIdx;
            const hasData = c.id && clubData[c.id];
            return (
              <button key={i} onClick={()=>{setActiveIdx(i);setErr("");setShowPaste(false);setTab("dashboard");}}
                style={{ background:active?ctc.bg:"#0f0d1a", border:`1px solid ${active?ctc.border:"#1e1b35"}`, borderRadius:10, padding:"7px 12px", cursor:c.id?"pointer":"not-allowed", opacity:c.id?1:0.45, display:"flex", alignItems:"center", gap:6, transition:"all 0.15s" }}>
                <span style={{ fontSize:10, fontWeight:800, color:active?ctc.text:"#6b7280", background:active?ctc.bg:"#1a1730", border:`1px solid ${active?ctc.border:"#2a2540"}`, borderRadius:4, padding:"1px 5px" }}>{c.tier}</span>
                <span style={{ fontSize:12, fontWeight:600, color:active?"#e2e0f0":"#6b7280" }}>{c.name}</span>
                {hasData && <span style={{ width:5, height:5, borderRadius:"50%", background:"#34d399", flexShrink:0 }}/>}
                {!c.id && <span style={{ fontSize:9, color:"#4b5563" }}>soon</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Active Club Banner */}
      <div style={{ ...S.card, background:tc.bg, border:`1px solid ${tc.border}`, padding:"14px 18px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <TierBadge tier={club.tier}/>
            <div>
              <div style={{ fontSize:20, fontWeight:800, color:"#e2e0f0" }}>{data?.clubName || club.name}</div>
              <div style={{ fontSize:11, color:"#9ca3af" }}>Officer: {club.officer} · ID: {club.id||"TBD"} · Max {MAX_MEMBERS} members</div>
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:13, fontWeight:700, color:tc.text }}>{fmt(club.target)} / member / month</div>
            {lastFetch && <div style={{ fontSize:10, color:"#6b7280", marginTop:2 }}>Updated {new Date(lastFetch).toLocaleString()}{data?.sourcePath ? ` · ${data.sourcePath}` : ""}</div>}
          </div>
        </div>
      </div>

      {/* Future club */}
      {!cid && (
        <div style={{ ...S.card, textAlign:"center", padding:"50px 20px" }}>
          <div style={{ fontSize:40, marginBottom:10 }}>🔜</div>
          <div style={{ color:"#6b7280" }}><b style={{color:"#9ca3af"}}>{club.name}</b> is a future addition.</div>
        </div>
      )}

      {err && <div style={{ background:"#450a0a", border:"1px solid #7f1d1d", borderRadius:12, padding:"12px 16px", marginBottom:14, color:"#fca5a5", fontSize:12 }}>⚠️ {err}</div>}

      {/* Paste Panel */}
      {showPaste && cid && (
        <div style={S.card}>
          <div style={S.h2}>📌 Paste JSON for {club.name}</div>
          <div style={{ color:"#9ca3af", fontSize:12, marginBottom:10, lineHeight:1.8 }}>
            For a permanent site-wide update, upload a JSON file to <b style={{color:"#c4b5fd"}}>/public/data/{cid}.json</b> in your repo and redeploy Netlify.
            Paste is still available here for quick testing in the current browser session only.
          </div>
          <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste the full JSON export here…"
            style={{ width:"100%", minHeight:160, background:"#0a0912", border:"1px solid #2a2540", borderRadius:8, color:"#e2e0f0", padding:12, fontSize:12, fontFamily:"monospace", resize:"vertical", boxSizing:"border-box", lineHeight:1.5 }} />
          <div style={{ display:"flex", gap:8, marginTop:10, alignItems:"center" }}>
            <button style={S.btn(true,tc.bar)} onClick={handlePaste}>Load Data</button>
            <button style={S.btn(false)} onClick={()=>{setShowPaste(false);setPasteText("");setErr("");}}>Cancel</button>
            {pasteText && <span style={{color:"#6b7280",fontSize:11}}>{pasteText.length.toLocaleString()} chars</span>}
          </div>
        </div>
      )}

      {/* Empty State */}
      {cid && !allMembers.length && !showPaste && (
        <div style={{ ...S.card, textAlign:"center", padding:"50px 20px" }}>
          <div style={{ fontSize:44, marginBottom:10 }}>🏇</div>
          <div style={{ color:"#6b7280", marginBottom:16 }}>No data for <b style={{color:"#9ca3af"}}>{club.name}</b> yet.</div>
          <div style={{ display:"flex", justifyContent:"center", gap:8 }}>
            <button style={S.btn(false,tc.bar)} onClick={fetchData}>⟳ Reload JSON</button>
            <button style={S.btn(true,tc.bar)} onClick={()=>setShowPaste(true)}>📋 Paste Export</button>
          </div>
        </div>
      )}

      {/* Tabs */}
      {cid && allMembers.length > 0 && (
        <>
          <div style={{ display:"flex", gap:5, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
            {[["dashboard","📊 Overview"],["members","👥 Members"],["debug","🔧 Debug"]].map(([t,label])=>(
              <button key={t} style={S.btn(tab===t, tab===t?tc.bar:undefined)} onClick={()=>setTab(t)}>{label}</button>
            ))}
            {inactiveMembers.length > 0 && (
              <button style={{ ...S.btn(showInactive,"#374151"), marginLeft:"auto", fontSize:11 }}
                onClick={()=>setShowInactive(v=>!v)}>
                {showInactive ? "👁 Hiding Inactive" : `👁 Show Inactive (${inactiveMembers.length})`}
              </button>
            )}
          </div>

          {/* ── DASHBOARD ─────────────────────────────────────────────── */}
          {tab==="dashboard" && (
            <>
              {/* Summary pills */}
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
                {[
                  { label:"Active Members",  value:`${activeMembers.length}/${MAX_MEMBERS}`,       sub:"Active / Capacity",         col:"#e2e0f0" },
                  { label:"On Track",        value:`${membersOnTrack}/${activeMembers.length}`,     sub:"Hit projected target",      col:membersOnTrack===activeMembers.length?"#34d399":"#fbbf24" },
                  { label:"Club Daily +",    value:fmt(totalDaily),                                 sub:"All active members today",  col:gainColor(totalDaily) },
                  { label:"Club Monthly +",  value:fmt(totalMonthly),                               sub:"Since 1st of month",        col:gainColor(totalMonthly) },
                  { label:"Per-Mbr Target",  value:fmt(club.target),                                sub:`${daysLeft} days left`,     col:tc.text },
                ].map(p=>(
                  <div key={p.label} style={{ background:"#111028", border:"1px solid #1e1b35", borderRadius:12, padding:"11px 14px", flex:1, minWidth:110 }}>
                    <div style={{ color:"#4b5563", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:3 }}>{p.label}</div>
                    <div style={{ color:p.col, fontSize:18, fontWeight:700 }}>{p.value}</div>
                    <div style={{ color:"#4b5563", fontSize:10, marginTop:2 }}>{p.sub}</div>
                  </div>
                ))}
              </div>

              {/* Per-member progress cards */}
              <div style={S.card}>
                <div style={S.h2}>Member Progress — Sorted by Monthly Gain</div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {sorted.filter(m => m.isActive !== false).map((m, i) => {
                    const monthPct  = club.target > 0 ? Math.min(100, ((m.monthlyGain??0) / club.target) * 100) : 0;
                    const onTrack   = (m.projected ?? 0) >= club.target;
                    const stillNeed = Math.max(0, club.target - (m.monthlyGain ?? 0));
                    return (
                      <div key={m.name} style={{ background:"#0f0d1a", border:`1px solid ${onTrack?"#34d39933":"#1e1b35"}`, borderRadius:10, padding:"12px 14px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7, flexWrap:"wrap", gap:4 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ color:"#4b5563", fontSize:11, fontWeight:700, minWidth:20 }}>#{i+1}</span>
                            <span style={{ fontWeight:700, color:"#e2e0f0", fontSize:13 }}>{m.name}</span>
                            <span style={{ background:onTrack?"#34d39922":"#fbbf2422", color:onTrack?"#34d399":"#fbbf24", border:`1px solid ${onTrack?"#34d39966":"#fbbf2466"}`, borderRadius:4, fontSize:10, fontWeight:700, padding:"1px 6px" }}>
                              {onTrack ? "✅ ON TRACK" : "⚠️ BEHIND"}
                            </span>
                          </div>
                          <div style={{ display:"flex", gap:14, fontSize:11, flexWrap:"wrap" }}>
                            <span style={{color:"#6b7280"}}>Today: <b style={{color:gainColor(m.dailyGain)}}>{m.dailyGain!=null?(m.dailyGain>=0?"+":"")+fmt(m.dailyGain):"—"}</b></span>
                            <span style={{color:"#6b7280"}}>Month: <b style={{color:gainColor(m.monthlyGain)}}>{m.monthlyGain!=null?(m.monthlyGain>=0?"+":"")+fmt(m.monthlyGain):"—"}</b></span>
                            <span style={{color:"#6b7280"}}>Proj: <b style={{color:onTrack?"#34d399":"#fbbf24"}}>{m.projected!=null?fmt(m.projected):"—"}</b></span>
                            <span style={{color:"#6b7280"}}>Total: <b style={{color:"#c4b5fd"}}>{fmt(m.fans)}</b></span>
                          </div>
                        </div>
                        <ProgressBar pct={monthPct} color={onTrack ? tc.bar : "#f59e0b"} height={7} />
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#4b5563", marginTop:4 }}>
                          <span>{fmt(m.monthlyGain ?? 0)} gained this month</span>
                          <span>{monthPct.toFixed(1)}% of target · {stillNeed > 0 ? `${fmt(stillNeed)} to go` : "✨ TARGET HIT"}</span>
                        </div>
                      </div>
                    );
                  })}
                  {showInactive && inactiveMembers.length > 0 && (
                    <>
                      <div style={{ color:"#4b5563", fontSize:11, fontWeight:600, padding:"4px 0", borderTop:"1px solid #1e1b35", marginTop:4 }}>
                        INACTIVE MEMBERS ({inactiveMembers.length})
                      </div>
                      {inactiveMembers.map(m => (
                        <div key={m.name} style={{ background:"#0a0912", border:"1px solid #1a1730", borderRadius:10, padding:"10px 14px", opacity:0.5 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
                            <span style={{ color:"#6b7280", fontWeight:600 }}>{m.name}</span>
                            <span style={{ color:"#4b5563" }}>{fmt(m.fans)} fans · No activity this month</span>
                          </div>
                        </div>
                      ))}
                    </>
                  )}
                </div>
              </div>
            </>
          )}

          {/* ── MEMBERS TABLE ─────────────────────────────────────────── */}
          {tab==="members" && (
            <div style={S.card}>
              <div style={S.h2}>All Members — Target: {fmt(club.target)}/member · Sorted by Monthly Gain</div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid #1e1b35" }}>
                      {["#","Member","Total Fans","Month Gain","% of Target","+Today","Projected","Status","Trend"].map(h=>(
                        <th key={h} style={{ padding:"7px 9px", textAlign:h==="#"||h==="Member"?"left":"right", color:"#4b5563", fontWeight:600, fontSize:10, textTransform:"uppercase", letterSpacing:"0.04em", whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map((m, i) => {
                      const monthPct = club.target > 0 ? Math.min(100, ((m.monthlyGain??0) / club.target) * 100) : 0;
                      const onTrack  = (m.projected ?? 0) >= club.target;
                      const inactive = m.isActive === false;
                      return (
                        <tr key={m.name} style={{ borderBottom:"1px solid #0f0d1a", opacity:inactive?0.45:1 }}
                          onMouseEnter={e=>e.currentTarget.style.background="#13112a"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <td style={{ padding:"10px 9px", color:"#4b5563", fontWeight:700 }}>{i+1}</td>
                          <td style={{ padding:"10px 9px", fontWeight:600, color: inactive?"#6b7280":"#e2e0f0", whiteSpace:"nowrap" }}>
                            {m.name} {inactive && <span style={{fontSize:9,color:"#4b5563"}}>INACTIVE</span>}
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"right", color:"#c4b5fd", fontWeight:700 }}>{fmt(m.fans)}</td>
                          <td style={{ padding:"10px 9px", textAlign:"right", color:gainColor(m.monthlyGain), fontWeight:700 }}>
                            {m.monthlyGain!=null?(m.monthlyGain>=0?"+":"")+fmt(m.monthlyGain):"—"}
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"right", minWidth:100 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:5, justifyContent:"flex-end" }}>
                              <div style={{ width:48 }}><ProgressBar pct={monthPct} color={tc.bar} height={5}/></div>
                              <span style={{ color:"#9ca3af", fontSize:10, minWidth:36 }}>{monthPct.toFixed(1)}%</span>
                            </div>
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"right", color:gainColor(m.dailyGain), fontWeight:600 }}>
                            {m.dailyGain!=null?(m.dailyGain>=0?"+":"")+fmt(m.dailyGain):"—"}
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"right", color:m.projected!=null?(onTrack?"#34d399":"#fbbf24"):"#4b5563", fontWeight:600 }}>
                            {m.projected!=null?fmt(m.projected):"—"}
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"center" }}>
                            {!inactive && <span style={{ background:onTrack?"#34d39922":"#fbbf2422", color:onTrack?"#34d399":"#fbbf24", border:`1px solid ${onTrack?"#34d39944":"#fbbf2444"}`, borderRadius:4, padding:"2px 6px", fontSize:9, fontWeight:700 }}>
                              {onTrack?"ON TRACK":"BEHIND"}
                            </span>}
                          </td>
                          <td style={{ padding:"10px 9px", textAlign:"right" }}>
                            <Sparkline data={m.dailyFans} width={80} height={24}/>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{ borderTop:"2px solid #1e1b35", background:"#13112a" }}>
                      <td colSpan={2} style={{ padding:"9px 9px", fontWeight:800, color:tc.text }}>ACTIVE TOTAL</td>
                      <td style={{ padding:"9px 9px", textAlign:"right", color:"#c4b5fd", fontWeight:800 }}>{fmt(totalFans)}</td>
                      <td style={{ padding:"9px 9px", textAlign:"right", color:gainColor(totalMonthly), fontWeight:700 }}>{fmt(totalMonthly)}</td>
                      <td/>
                      <td style={{ padding:"9px 9px", textAlign:"right", color:gainColor(totalDaily), fontWeight:700 }}>{fmt(totalDaily)}</td>
                      <td style={{ padding:"9px 9px", textAlign:"right", color:"#9ca3af", fontWeight:700 }}>{fmt(totalProj)}</td>
                      <td colSpan={2}/>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

          {/* ── DEBUG ─────────────────────────────────────────────────── */}
          {tab==="debug" && (
            <div style={S.card}>
              <div style={S.h2}>Debug — {club.name}</div>
              <div style={{ color:"#6b7280", fontSize:12, marginBottom:8 }}>
                Total members in data: {allMembers.length} · Active: {activeMembers.length} · Inactive: {inactiveMembers.length}
              </div>
              {debugLog.length > 0
                ? <pre style={{ background:"#0a0912", borderRadius:8, padding:12, fontSize:11, color:"#86efac", lineHeight:1.6, overflowX:"auto" }}>{debugLog.join("\n")}</pre>
                : <div style={{ color:"#4b5563", fontSize:12 }}>Hit Reload JSON to see deployed file fetch logs.</div>}
              <div style={{ marginTop:14, display:"flex", gap:8, flexWrap:"wrap" }}>
                <button style={{ ...S.btn(false), fontSize:11 }} onClick={()=>{
                  const u = { ...clubData };
                  delete u[cid];
                  setClubData(u);
                }}>🗑 Clear {club.name} (session)</button>
                <button style={{ ...S.btn(false,"#7f1d1d"), fontSize:11 }} onClick={()=>{
                  setClubData({});
                }}>🗑 Clear ALL (session)</button>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<CircleTracker />);
  </script>
</body>
</html>
