name: Refresh Chronogenesis JSON
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Initialize package.json if missing
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi
      - name: Install dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth csv-parse
          npx playwright install --with-deps chromium
      - name: Install xvfb for headed browser
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Check cookie presence
        env:
          DOWNLOAD_COOKIE: ${{ secrets.DOWNLOAD_COOKIE }}
        run: |
          if [ -z "$DOWNLOAD_COOKIE" ]; then
            echo "DOWNLOAD_COOKIE is EMPTY"
            exit 1
          else
            echo "DOWNLOAD_COOKIE is SET"
          fi
      - name: Refresh Chronogenesis JSON files
        id: refresh
        continue-on-error: true
        env:
          DOWNLOAD_COOKIE: ${{ secrets.DOWNLOAD_COOKIE }}
        run: xvfb-run --auto-servernum node scripts/update-chronogenesis.mjs
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chronogenesis-debug
          path: |
            data/chronogenesis/debug-*.png
            data/chronogenesis/debug-*.html
          retention-days: 7
          if-no-files-found: ignore
      - name: Verify Chronogenesis output exists
        if: steps.refresh.outcome == 'success'
        run: |
          mkdir -p data/chronogenesis
          if ! find data/chronogenesis -maxdepth 1 -name '*.json' -not -name 'debug-*' | grep -q .; then
            echo "No Chronogenesis JSON files were generated"
            exit 1
          fi
      - name: Commit updated Chronogenesis JSON files
        if: steps.refresh.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if find data/chronogenesis -maxdepth 1 -name '*.json' | grep -q .; then
            git add data/chronogenesis/*.json
            git diff --staged --quiet || git commit -m "Refresh Chronogenesis JSON"
          else
            echo "No Chronogenesis JSON files found to commit"
          fi
      - name: Push changes
        if: steps.refresh.outcome == 'success'
        run: git push
      - name: Fail if refresh failed
        if: steps.refresh.outcome == 'failure'
        run: |
          echo "Refresh step failed — check debug artifacts for screenshots and HTML dumps"
          exit 1
