name: Refresh Chronogenesis JSON

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize package.json if missing
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Install dependencies
        run: |
          npm install playwright csv-parse
          npx playwright install --with-deps chromium

      - name: Check cookie presence
        env:
          DOWNLOAD_COOKIE: ${{ secrets.DOWNLOAD_COOKIE }}
        run: |
          if [ -z "$DOWNLOAD_COOKIE" ]; then
            echo "DOWNLOAD_COOKIE is EMPTY"
            exit 1
          else
            echo "DOWNLOAD_COOKIE is SET"
          fi

      - name: Refresh Chronogenesis JSON files
        env:
          DOWNLOAD_COOKIE: ${{ secrets.DOWNLOAD_COOKIE }}
        run: node scripts/update-chronogenesis.mjs

      - name: Verify Chronogenesis output exists
        run: |
          mkdir -p data/chronogenesis
          if ! find data/chronogenesis -maxdepth 1 -name '*.json' | grep -q .; then
            echo "No Chronogenesis JSON files were generated"
            exit 1
          fi

      - name: Commit updated Chronogenesis JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if find data/chronogenesis -maxdepth 1 -name '*.json' | grep -q .; then
            git add data/chronogenesis/*.json
            git diff --staged --quiet || git commit -m "Refresh Chronogenesis JSON"
          else
            echo "No Chronogenesis JSON files found to commit"
          fi

      - name: Push changes
        run: git push
